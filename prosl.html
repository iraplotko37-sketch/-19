<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connect Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .screen { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        /* Кнопки */
        .btn { background: #0070f3; color: #fff; border: none; padding: 20px; border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,112,243,0.3); }
        .btn-admin { background: #222; border: 1px solid #444; }
        .btn-connect { background: #00ff41; color: #000; }

        /* Поля ввода */
        input { background: #111; border: 2px solid #333; color: #00ff41; padding: 15px; width: 100%; border-radius: 10px; font-size: 20px; text-align: center; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #0070f3; }

        /* Чат */
        #chat-area { background: #050505; height: 250px; overflow-y: auto; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-bottom: 10px; text-align: left; }
        .m { margin-bottom: 10px; padding: 8px; border-radius: 8px; font-size: 14px; max-width: 80%; }
        .me { background: #0070f3; margin-left: auto; }
        .him { background: #333; color: #00ff41; }

        #my-id-val { font-size: 45px; color: #00ff41; font-family: monospace; margin: 20px 0; display: block; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen">
        <h3>Выберите режим</h3>
        <button class="btn" onclick="initClient()">Я КЛИЕНТ (Дать доступ)</button>
        <button class="btn btn-admin" onclick="showPassScreen()">Я АДМИН (Подключиться)</button>
    </div>

    <div id="screen-pass" class="screen hidden">
        <h3>Доступ админа</h3>
        <input type="password" id="admin-pass" placeholder="Пароль">
        <button class="btn" onclick="verifyPass()">ВОЙТИ</button>
        <button class="btn btn-admin" onclick="location.reload()">НАЗАД</button>
    </div>

    <div id="screen-wait" class="screen hidden">
        <p>Ваш код для подключения:</p>
        <b id="my-id-val">...</b>
        <p style="color: #888;">Ожидайте подключения админа...</p>
    </div>

    <div id="screen-connect" class="screen hidden">
        <h3>Подключение</h3>
        <input type="number" id="target-id" inputmode="numeric" placeholder="Введите 5 цифр">
        <button class="btn btn-connect" onclick="connectToPeer()">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <div id="screen-chat" class="screen hidden">
        <div id="chat-area"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="msg-input" placeholder="Сообщение..." style="margin:0;">
            <button onclick="sendMsg()" style="padding:15px; border-radius:10px; border:none; background:#0070f3; color:#white;">-></button>
        </div>
    </div>

    <audio id="remote-audio" autoplay playsinline></audio>

<script>
    let peer, conn, localStream;
    const shortId = Math.floor(Math.random() * 90000) + 10000;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // --- ЛОГИКА КЛИЕНТА ---
    async function initClient() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            peer = new Peer(shortId);
            
            peer.on('open', (id) => {
                document.getElementById('my-id-val').innerText = id;
                showScreen('screen-wait');
            });

            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', s => { document.getElementById('remote-audio').srcObject = s; });
                setupChatLogic();
            });

            peer.on('connection', c => {
                conn = c;
                setupChatLogic();
            });

        } catch (e) {
            alert("Ошибка: Разрешите доступ к микрофону!");
        }
    }

    // --- ЛОГИКА АДМИНА ---
    function showPassScreen() { showScreen('screen-pass'); }

    function verifyPass() {
        if(document.getElementById('admin-pass').value === '2013') {
            peer = new Peer(); // Админу ID не важен
            showScreen('screen-connect');
        } else {
            alert("Неверно!");
        }
    }

    async function connectToPeer() {
        const tid = document.getElementById('target-id').value;
        if(!tid) return;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // Голос
            const call = peer.call(tid, localStream);
            call.on('stream', s => { document.getElementById('remote-audio').srcObject = s; });

            // Чат
            conn = peer.connect(tid);
            setupChatLogic();
        } catch (e) {
            alert("Ошибка подключения или микрофона");
        }
    }

    // --- ОБЩАЯ ЛОГИКА ЧАТА ---
    function setupChatLogic() {
        showScreen('screen-chat');
        conn.on('data', data => addMessage(data, 'him'));
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if(input.value && conn) {
            conn.send(input.value);
            addMessage(input.value, 'me');
            input.value = '';
        }
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = 'm ' + side;
        div.innerText = text;
        const area = document.getElementById('chat-area');
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    // Фикс для мобильного звука
    document.addEventListener('touchstart', () => {
        const audio = document.getElementById('remote-audio');
        if (audio.paused) audio.play();
    }, { once: false });

</script>
</body>
</html>
