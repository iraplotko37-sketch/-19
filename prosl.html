<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instant Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .screen { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        .btn { background: #0070f3; color: #fff; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-gray { background: #222; color: #888; }
        input { background: #111; border: 2px solid #333; color: #0f0; padding: 15px; width: 100%; border-radius: 10px; font-size: 20px; text-align: center; margin-bottom: 10px; outline: none; }
        #id-box { font-size: 48px; color: #0f0; font-family: monospace; margin: 15px 0; font-weight: bold; }
        #chat-area { background: #050505; height: 45vh; overflow-y: auto; border: 1px solid #222; border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .m { margin-bottom: 8px; padding: 10px; border-radius: 10px; font-size: 14px; max-width: 85%; word-wrap: break-word; }
        .me { background: #0070f3; align-self: flex-end; }
        .him { background: #333; color: #0f0; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="scr-1" class="screen">
        <h2>Fast Connect</h2>
        <button class="btn" onclick="start('client')">КЛИЕНТ (ПОЛУЧИТЬ КОД)</button>
        <button class="btn btn-gray" onclick="show('scr-pass')">АДМИН (ВВЕСТИ КОД)</button>
    </div>

    <div id="scr-pass" class="screen hidden">
        <input type="password" id="pass" placeholder="ПАРОЛЬ">
        <button class="btn" onclick="if(document.getElementById('pass').value=='2013')show('scr-admin');else alert('!')">ВХОД</button>
    </div>

    <div id="scr-wait" class="screen hidden">
        <p>Ваш код:</p>
        <div id="id-box">...</div>
        <p style="color:#666">Ждем админа...</p>
    </div>

    <div id="scr-admin" class="screen hidden">
        <input type="number" id="tid" inputmode="numeric" placeholder="КОД КЛИЕНТА">
        <button class="btn" onclick="start('admin')">СОЕДИНИТЬ</button>
    </div>

    <div id="scr-chat" class="screen hidden">
        <div id="chat-area"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="msg" placeholder="..." style="margin:0;">
            <button class="btn" onclick="send()" style="width:60px; margin:0;">➤</button>
        </div>
        <button class="btn btn-gray" onclick="location.reload()" style="margin-top:10px; padding:10px;">ВЫЙТИ</button>
    </div>

    <audio id="player" autoplay playsinline></audio>

<script>
    let peer, conn, stream;
    // Конфигурация для мгновенного проброса через NAT
    const cfg = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function start(role) {
        try {
            // Сначала микрофон - без него мобилки не пустят дальше
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            if (role === 'client') {
                const numId = Math.floor(Math.random() * 90000) + 10000;
                peer = new Peer(numId, cfg);
                peer.on('open', id => {
                    document.getElementById('id-box').innerText = id;
                    show('scr-wait');
                });
            } else {
                const tid = document.getElementById('tid').value;
                peer = new Peer(cfg);
                peer.on('open', () => {
                    // Параллельный запуск голоса и текста
                    peer.call(tid, stream).on('stream', s => { document.getElementById('player').srcObject = s; });
                    const c = peer.connect(tid);
                    setupConn(c);
                });
            }

            peer.on('call', call => {
                call.answer(stream);
                call.on('stream', s => { document.getElementById('player').srcObject = s; });
            });

            peer.on('connection', setupConn);

        } catch (e) { alert("Ошибка микрофона"); }
    }

    function setupConn(c) {
        conn = c;
        conn.on('open', () => {
            show('scr-chat');
            conn.on('data', d => addMsg(d, 'him'));
        });
    }

    function send() {
        const i = document.getElementById('msg');
        if(i.value && conn) {
            conn.send(i.value);
            addMsg(i.value, 'me');
            i.value = '';
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = 'm ' + s;
        d.innerText = t;
        const a = document.getElementById('chat-area');
        a.appendChild(d);
        a.scrollTop = a.scrollHeight;
    }

    // Разблокировка звука на мобилках
    document.addEventListener('click', () => { document.getElementById('player').play(); }, { once: true });
</script>
</body>
</html>
