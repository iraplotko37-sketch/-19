<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Secure Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; width: 350px; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        button { background: #0070f3; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        input { background: #000; border: 1px solid #444; color: #0f0; padding: 10px; width: calc(100% - 22px); margin-top: 10px; text-align: center; }
        #display-id { font-size: 28px; color: #0f0; margin: 15px 0; font-family: monospace; display: none; border: 1px dashed #0f0; padding: 10px; }
        
        /* Стили чата */
        #chat-window { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        #messages { height: 150px; overflow-y: auto; background: #000; border: 1px solid #333; padding: 10px; font-size: 14px; margin-bottom: 10px; text-align: left; }
        .msg { margin-bottom: 5px; color: #aaa; }
        .msg.me { color: #0070f3; }
        .msg.him { color: #0f0; }

        .admin { display: none; margin-top: 20px; border-top: 1px solid #444; padding-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <div id="setup-side">
        <h3>Private System</h3>
        <button id="start-btn" onclick="startSession()">АКТИВИРОВАТЬ СВЯЗЬ</button>
        <div id="display-id"></div>
    </div>

    <input type="password" placeholder="..." oninput="if(this.value=='2013')showAdmin()" style="opacity:0.05; width:20px; border:none; outline:none; position:absolute; bottom:10px;">

    <div id="admin-panel" class="admin">
        <h4 style="color:#0f0; margin:0 0 10px 0;">ADMIN PANEL</h4>
        <input type="number" id="tid" placeholder="Введите 5 цифр цели">
        <button onclick="connectToPeer()" style="background:#222; border:1px solid #0f0; color:#0f0; margin-top:10px;">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <div id="chat-window">
        <div id="messages"></div>
        <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key=='Enter')send()">
        <button onclick="send()" style="margin-top:5px; background:#333;">ОТПРАВИТЬ</button>
    </div>
</div>

<audio id="audio" autoplay></audio>

<script>
    let peer, conn, currentStream;
    const shortId = Math.floor(Math.random() * 90000) + 10000;

    function startSession() {
        peer = new Peer(shortId);
        
        peer.on('open', (id) => {
            document.getElementById('display-id').innerText = "ID: " + id;
            document.getElementById('display-id').style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
        });

        // Захват микрофона
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            currentStream = stream;
            
            // Ждем звонка
            peer.on('call', call => {
                call.answer(stream);
                call.on('stream', remoteStream => playAudio(remoteStream));
            });

            // Ждем текстового подключения
            peer.on('connection', c => {
                conn = c;
                setupChat();
            });
        });
    }

    function showAdmin() {
        document.getElementById('admin-panel').style.display = 'block';
    }

    function connectToPeer() {
        const target = document.getElementById('tid').value;
        
        // 1. Голосовая связь
        const call = peer.call(target, currentStream);
        call.on('stream', remoteStream => playAudio(remoteStream));

        // 2. Текстовый чат
        conn = peer.connect(target);
        setupChat();
    }

    function setupChat() {
        document.getElementById('chat-window').style.display = 'block';
        document.getElementById('setup-side').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'none';

        conn.on('data', data => {
            addMessage(data, 'him');
        });
    }

    function send() {
        const input = document.getElementById('msg-input');
        const text = input.value;
        if(text && conn) {
            conn.send(text);
            addMessage(text, 'me');
            input.value = '';
        }
    }

    function addMessage(text, side) {
        const div = document.createElement('div');
        div.className = 'msg ' + side;
        div.innerText = (side === 'me' ? 'Вы: ' : 'Собеседник: ') + text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function playAudio(stream) {
        document.getElementById('audio').srcObject = stream;
    }
</script>

</body>
</html>
