<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер видео в MP3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
    :root {
        --glass-bg: rgba(253, 224, 71, 0.08);
        --glass-border: rgba(56, 189, 248, 0.25);
        --text-main: #FFFFFF;
        --text-muted: #BAE6FD;
        --accent: #FDE047;
        --accent-secondary: #38BDF8;
        --hover-bg: rgba(253, 224, 71, 0.15);
        --shadow-color: rgba(0, 0, 0, 0.4);
        --success: #4ade80;
        --error: #f87171;
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background-color: #749CF9;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        background-image: 
            radial-gradient(circle at 0% 0%, rgba(253, 224, 71, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.12) 0%, transparent 50%);
        background-attachment: fixed;
    }

    /* Карточка в стиле /files */
    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);        border-radius: 20px;
        padding: 40px 35px;
        max-width: 550px;
        width: 100%;
        text-align: center;
        box-shadow: 
            0 25px 50px -12px var(--shadow-color),
            0 0 0 1px rgba(253, 224, 71, 0.05) inset;
        animation: fadeIn 0.8s ease-out;
        margin-bottom: 20px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Иконка */
    .icon-wrapper {
        width: 90px;
        height: 90px;
        margin: 0 auto 20px;
        background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(56, 189, 248, 0.25);
    }

    .icon-wrapper i {
        font-size: 2.5rem;
        color: #0f172a;
    }

    /* Заголовок */
    h1 {
        font-size: 1.8rem;
        margin-bottom: 10px;
        font-weight: 600;
        background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .subtitle {
        color: var(--text-muted);
        font-size: 1rem;
        margin-bottom: 30px;        line-height: 1.6;
    }

    /* Зона загрузки */
    .drop-zone {
        border: 2px dashed var(--glass-border);
        border-radius: 16px;
        padding: 40px 20px;
        margin: 20px 0;
        cursor: pointer;
        transition: all 0.3s ease;
        background: rgba(253, 224, 71, 0.05);
    }

    .drop-zone:hover, .drop-zone.dragover {
        border-color: var(--accent);
        background: var(--hover-bg);
    }

    .drop-zone i {
        font-size: 3rem;
        color: var(--accent);
        margin-bottom: 15px;
    }

    .drop-zone p {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    input[type="file"] {
        display: none;
    }

    /* Прогресс бар */
    .progress-container {
        display: none;
        margin: 20px 0;
    }

    .progress-bar {
        height: 8px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        margin: 10px 0;
    }

    .progress-fill {
        height: 100%;        background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
        width: 0%;
        transition: width 0.3s ease;
        border-radius: 4px;
    }

    .progress-text {
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    /* Кнопки */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 32px;
        border-radius: 12px;
        font-size: 1.05rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.25s ease;
        border: 1px solid var(--glass-border);
        background: var(--hover-bg);
        color: var(--text-main);
        cursor: pointer;
    }

    .btn:hover {
        background: var(--hover-bg);
        color: #fff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        border-color: var(--accent-secondary);
        transform: translateY(-2px);
    }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
        color: #0f172a;
        border: none;
    }

    .btn-primary:hover {        box-shadow: 0 6px 25px rgba(253, 224, 71, 0.4);
    }

    /* Сообщение о статусе */
    .status-message {
        display: none;
        padding: 15px;
        border-radius: 12px;
        margin: 20px 0;
        font-size: 0.95rem;
    }

    .status-message.success {
        background: rgba(74, 222, 128, 0.15);
        border: 1px solid var(--success);
        color: var(--success);
    }

    .status-message.error {
        background: rgba(248, 113, 113, 0.15);
        border: 1px solid var(--error);
        color: var(--error);
    }

    /* Информация о файле */
    .file-info {
        display: none;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 15px;
        margin: 15px 0;
        text-align: left;
    }

    .file-info-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--glass-border);
        font-size: 0.9rem;
    }

    .file-info-row:last-child {
        border-bottom: none;
    }

    .file-info-label {
        color: var(--text-muted);
    }
    .file-info-value {
        color: var(--text-main);
        font-weight: 500;
    }

    /* Футер */
    .footer {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--glass-border);
        color: var(--text-muted);
        font-size: 0.85rem;
        text-align: center;
    }

    .footer a {
        color: var(--accent);
        text-decoration: none;
        transition: color 0.2s ease;
    }

    .footer a:hover {
        color: var(--accent-secondary);
    }

    .nav-links {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
        flex-wrap: wrap;
    }

    .nav-links a {
        padding: 8px 16px;
        border-radius: 8px;
        background: rgba(253, 224, 71, 0.1);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        font-size: 0.85rem;
        transition: all 0.25s ease;
    }

    .nav-links a:hover {
        background: var(--hover-bg);
        color: var(--accent-secondary);
        transform: translateY(-2px);
    }

    /* Адаптив */    @media (max-width: 600px) {
        .card { padding: 30px 20px; }
        h1 { font-size: 1.5rem; }
        .drop-zone { padding: 30px 15px; }
        .btn { padding: 12px 24px; font-size: 0.95rem; }
    }
    </style>
</head>
<body>
    <div class="card">
        <!-- Иконка -->
        <div class="icon-wrapper">
            <i class="fas fa-music"></i>
        </div>

        <!-- Заголовок -->
        <h1>Конвертер видео в MP3</h1>
        <p class="subtitle">
            Быстро и бесплатно конвертируйте видео в аудиоформат MP3.<br>
            Поддерживаются: MP4, AVI, MKV, MOV, WEBM
        </p>

        <!-- Зона загрузки -->
        <label class="drop-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <p><strong>Перетащите видео сюда</strong><br>или нажмите для выбора файла</p>
            <input type="file" id="fileInput" accept="video/*,.mp4,.avi,.mkv,.mov,.webm">
        </label>

        <!-- Информация о файле -->
        <div class="file-info" id="fileInfo">
            <div class="file-info-row">
                <span class="file-info-label">📁 Имя файла:</span>
                <span class="file-info-value" id="fileName">-</span>
            </div>
            <div class="file-info-row">
                <span class="file-info-label">📏 Размер:</span>
                <span class="file-info-value" id="fileSize">-</span>
            </div>
            <div class="file-info-row">
                <span class="file-info-label">🎬 Формат:</span>
                <span class="file-info-value" id="fileFormat">-</span>
            </div>
        </div>

        <!-- Прогресс -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-text" id="progressText">Конвертация...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>            </div>
        </div>

        <!-- Сообщение о статусе -->
        <div class="status-message" id="statusMessage"></div>

        <!-- Кнопки -->
        <div style="margin-top: 20px;">
            <button class="btn btn-primary" id="convertBtn" disabled>
                <i class="fas fa-sync-alt"></i>
                Конвертировать в MP3
            </button>
        </div>

        <div style="margin-top: 15px;">
            <a href="index.html" class="btn">
                <i class="fas fa-home"></i>
                На главную
            </a>
        </div>

        <!-- Футер -->
        <div class="footer">
            <p></> Coded with love by <a href="https://github.com/iraplotko37-sketch">Mark</a></p>
            <p style="margin-top: 8px; opacity: 0.7;">© 2026 19-sandy</p>
            
            <div class="nav-links">
                <a href="index.html">🏠 Главная</a>
                <a href="https://19-sandy.vercel.app/files">📁 Файлы</a>
                <a href="chat.html">💬 Чат</a>
            </div>
        </div>
    </div>

    <!-- Скрипт конвертации (используем API) -->
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileFormat = document.getElementById('fileFormat');
        const convertBtn = document.getElementById('convertBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const statusMessage = document.getElementById('statusMessage');

        let selectedFile = null;
        // Клик по зоне → выбор файла
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        ['dragenter', 'dragover'].forEach(evt => {
            dropZone.addEventListener(evt, () => dropZone.classList.add('dragover'));
        });
        ['dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'));
        });
        dropZone.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            // Проверка типа файла
            const validTypes = ['video/mp4', 'video/x-msvideo', 'video/x-matroska', 'video/quicktime', 'video/webm'];
            const validExtensions = ['.mp4', '.avi', '.mkv', '.mov', '.webm'];
            
            const hasValidExtension = validExtensions.some(ext => file.name.toLowerCase().endsWith(ext));
            const hasValidType = validTypes.includes(file.type) || file.type.startsWith('video/');

            if (!hasValidType && !hasValidExtension) {
                showStatus('❌ Unsupported file format. Please upload MP4, AVI, MKV, MOV, or WEBM.', 'error');
                return;
            }

            // Проверка размера (макс. 100 MB)
            const maxSize = 100 * 1024 * 1024;
            if (file.size > maxSize) {
                showStatus('❌ File too large. Maximum size is 100 MB.', 'error');
                return;
            }

            selectedFile = file;
            
            // Отображение информации
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);            fileFormat.textContent = file.name.split('.').pop().toUpperCase();
            fileInfo.style.display = 'block';
            
            // Активация кнопки
            convertBtn.disabled = false;
            hideStatus();
        }

        // Конвертация
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI обновления
            convertBtn.disabled = true;
            progressContainer.style.display = 'block';
            hideStatus();

            try {
                // Имитация прогресса (так как реальная конвертация требует сервера)
                await simulateConversion();
                
                // Для реальной конвертации используйте один из вариантов ниже:
                // Вариант 1: Online-Convert API
                // Вариант 2: FFmpeg.wasm (клиентская конвертация)
                // Вариант 3: Свой сервер с FFmpeg

                showStatus('✅ Конвертация завершена! (Демо-режим)', 'success');
                
            } catch (error) {
                showStatus('❌ Ошибка конвертации: ' + error.message, 'error');
            } finally {
                convertBtn.disabled = false;
                progressContainer.style.display = 'none';
                progressFill.style.width = '0%';
            }
        });

        // Имитация конвертации (замените на реальный API)
        function simulateConversion() {
            return new Promise((resolve) => {
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 15;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(interval);
                        progressText.textContent = 'Готово!';
                        setTimeout(resolve, 500);
                    } else {
                        progressFill.style.width = progress + '%';                        progressText.textContent = `Конвертация... ${Math.round(progress)}%`;
                    }
                }, 300);
            });
        }

        // Показать сообщение
        function showStatus(text, type) {
            statusMessage.textContent = text;
            statusMessage.className = 'status-message ' + type;
            statusMessage.style.display = 'block';
        }

        // Скрыть сообщение
        function hideStatus() {
            statusMessage.style.display = 'none';
        }

        // Форматирование размера
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
            return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
        }
    </script>
</body>
              </html>
