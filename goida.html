<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>GOIDA</title>

<style>
:root{
    --primary:#7DA1ED;
    --accent:#FDE047;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
        radial-gradient(circle at 20% 20%,rgba(255,255,255,.18),transparent 35%),
        radial-gradient(circle at 80% 80%,rgba(255,255,255,.12),transparent 35%),
        linear-gradient(180deg,#8CB0F3,#7DA1ED);
    font-family:system-ui,-apple-system,sans-serif;
}

/* Liquid Glass Filter */
svg{
    position:absolute;
    width:0;
    height:0;
}

/* Glass Card */

.card{

    position:relative;

    width:340px;
    height:340px;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    border-radius:42px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,.34),
            rgba(255,255,255,.08)
        );

    backdrop-filter:
        blur(30px)
        saturate(180%)
        brightness(1.12)
        url(#glass);

    -webkit-backdrop-filter:
        blur(30px)
        saturate(180%)
        brightness(1.12);

    border:1px solid rgba(255,255,255,.35);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.75),
        inset 0 20px 45px rgba(255,255,255,.08),
        0 35px 70px rgba(0,0,0,.18);
}

/* Верхний блик */

.card::before{

    content:"";

    position:absolute;

    width:170%;
    height:70%;

    left:-35%;
    top:-38%;

    transform:rotate(-8deg);

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,.65),
        rgba(255,255,255,0)
    );
}

/* Внутреннее стекло */

.card::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:inherit;

    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 0 -25px 45px rgba(255,255,255,.05);

}

/* Button */

#play{

    width:180px;
    height:180px;

    border:none;
    border-radius:50%;

    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(
            180deg,
            #FFF8AF,
            #FDE047 55%,
            #EAB308
        );

    box-shadow:
        inset 0 7px 10px rgba(255,255,255,.7),
        inset 0 -10px 18px rgba(170,130,0,.25),
        0 18px 40px rgba(253,224,71,.45);

    transition:.18s;

    z-index:2;
}

#play:hover{
    transform:scale(1.05);
}

#play:active{
    transform:scale(.94);
}

/* Play icon */

.icon{
    display:block;
}

.play{

    width:0;
    height:0;

    margin-left:8px;

    border-top:23px solid transparent;
    border-bottom:23px solid transparent;
    border-left:40px solid #685800;
}

/* Pause icon */

.pause{

    position:relative;

    width:36px;
    height:44px;
}

.pause::before,
.pause::after{

    content:"";

    position:absolute;

    top:0;

    width:11px;
    height:44px;

    border-radius:3px;

    background:#685800;
}

.pause::before{
    left:0;
}

.pause::after{
    right:0;
}

/* Pulse */

#play.playing{

    animation:pulse 1.6s infinite;
}

@keyframes pulse{

0%{
box-shadow:
0 0 0 0 rgba(253,224,71,.45),
inset 0 7px 10px rgba(255,255,255,.7);
}

70%{
box-shadow:
0 0 0 28px rgba(253,224,71,0),
inset 0 7px 10px rgba(255,255,255,.7);
}

100%{
box-shadow:
0 0 0 0 rgba(253,224,71,0),
inset 0 7px 10px rgba(255,255,255,.7);
}

}

</style>
</head>

<body>

<svg xmlns="http://www.w3.org/2000/svg">
<filter id="glass">
<feTurbulence
type="fractalNoise"
baseFrequency="0.02"
numOctaves="2"
seed="2"
result="noise"/>
<feDisplacementMap
in="SourceGraphic"
in2="noise"
scale="8"/>
</filter>
</svg>

<div class="card">

<button id="play">

<span class="icon play"></span>

</button>

</div>

<script>

const button=document.getElementById("play");
const icon=document.querySelector(".icon");

let audio;

button.onclick=()=>{

if(!audio){

audio=new Audio("https://plotko.qzz.io/goida.mp3");

}

if(audio.paused){

audio.play();

button.classList.add("playing");

icon.className="icon pause";

}else{

audio.pause();

button.classList.remove("playing");

icon.className="icon play";

}

audio.onended=()=>{

button.classList.remove("playing");

icon.className="icon play";

};

};

</script>

</body>
</html>
