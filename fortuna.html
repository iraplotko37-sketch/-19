<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fast Liquid Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7DA1ED;
            --accent: #FDE047;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: var(--primary);
            background: radial-gradient(circle at center, #91b3f2 0%, #7DA1ED 100%);
            font-family: 'Manrope', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: white; padding: 20px; overflow: hidden;
        }

        svg#filters { display: none; }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px) url(#displacementFilter);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            position: relative;
            width: 100%; max-width: 400px;
            text-align: center;
        }

        .settings-toggle {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            width: 40px; height: 40px; border-radius: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 10;
        }
        .settings-toggle svg { fill: var(--accent); width: 20px; height: 20px; }

        .wheel-box { position: relative; margin: 20px 0; display: flex; justify-content: center; }

        canvas {
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 6px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .pointer {
            position: absolute; top: -10px; left: 50%;
            transform: translateX(-50%);
            width: 24px; height: 30px;
            background: var(--accent);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 5;
            filter: drop-shadow(0 3px 2px rgba(0,0,0,0.3));
        }

        .spin-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 16px; font-weight: 800;
            color: #2c3e50;
            background: var(--accent);
            border: none; border-radius: 15px;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(253, 224, 71, 0.4);
            transition: transform 0.1s;
        }
        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        #result-display {
            margin-top: 15px; font-size: 20px; font-weight: 800;
            color: var(--accent); min-height: 28px;
            text-shadow: 0 0 10px rgba(253, 224, 71, 0.3);
        }

        .settings-panel {
            max-height: 0; overflow: hidden;
            transition: 0.4s ease; opacity: 0;
        }
        .settings-panel.open { max-height: 400px; opacity: 1; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--glass-border); }

        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input {
            flex: 1; padding: 10px; border-radius: 10px;
            border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1);
            color: white; outline: none;
        }
        .add-btn { padding: 10px 15px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; }
        .items-list { background: rgba(0,0,0,0.1); border-radius: 15px; max-height: 150px; overflow-y: auto; text-align: left; }
        .list-item { display: flex; justify-content: space-between; padding: 8px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <svg id="filters">
        <filter id="displacementFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="container">
        <button class="settings-toggle" onclick="toggleSettings()">
            <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.52c.04-.32.07-.64.07-.98 0-.34-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98 0 .33.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/></svg>
        </button>

        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>
        
        <div id="result-display"></div>
        <button class="spin-btn" id="spinBtn" onclick="startSpin()">Крутить!</button>

        <div class="settings-panel" id="settingsPanel">
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="Добавить..." onkeypress="if(event.key==='Enter')addItem()">
                <button class="add-btn" onclick="addItem()">+</button>
            </div>
            <div class="items-list" id="itemsList"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDisplay = document.getElementById('result-display');
        const itemsList = document.getElementById('itemsList');

        let segments = ['100$', 'Пусто', 'Бонус', '500$', 'Скидка', 'ДЖЕКПОТ'];
        const colors = ['#7DA1ED', '#FDE047', '#FFFFFF'];
        
        let angle = 0; 
        let isSpinning = false;

        function draw() {
            const size = canvas.width;
            const center = size / 2;
            const radius = size / 2 - 10;
            const arc = (Math.PI * 2) / segments.length;

            ctx.clearRect(0, 0, size, size);
            
            segments.forEach((text, i) => {
                const segAngle = angle + i * arc;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, segAngle, segAngle + arc);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(segAngle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (colors[i % colors.length] === '#7DA1ED') ? "#fff" : "#2c3e50";
                ctx.font = "bold 34px Manrope";
                ctx.fillText(text, radius - 30, 12);
                ctx.restore();
            });
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            resultDisplay.textContent = "";

            // ИЗМЕНЕНИЯ ТУТ:
            let velocity = 0.6 + Math.random() * 0.3; // Увеличили начальный толчок (было ~0.3)
            const friction = 0.955;                   // Усилили трение (было 0.985)
            const stopVelocity = 0.003;               // Порог остановки

            function animate() {
                angle += velocity;
                velocity *= friction; 

                draw();

                if (velocity > stopVelocity) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    
                    const totalArc = Math.PI * 2;
                    const normalizedAngle = (angle % totalArc + totalArc) % totalArc;
                    const winningIndex = segments.length - 1 - Math.floor(((normalizedAngle + Math.PI/2) % totalArc) / (totalArc / segments.length));
                    const finalIdx = (winningIndex + segments.length) % segments.length;
                    
                    resultDisplay.textContent = `🎉 ${segments[finalIdx]}`;
                }
            }
            animate();
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }
        function addItem() {
            const input = document.getElementById('itemInput');
            if (input.value.trim()) {
                segments.push(input.value.trim());
                input.value = "";
                renderList();
                draw();
            }
        }
        function removeItem(i) {
            if (segments.length > 2) {
                segments.splice(i, 1);
                renderList();
                draw();
            }
        }
        function renderList() {
            itemsList.innerHTML = segments.map((s, i) => `
                <div class="list-item">
                    <span>${s}</span>
                    <button style="color:#ff6b6b; border:none; background:none; cursor:pointer;" onclick="removeItem(${i})">×</button>
                </div>
            `).join('');
        }

        renderList();
        draw();
    </script>
</body>
</html>
