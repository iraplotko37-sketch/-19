<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С 8 Марта! 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #7EA1EC;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', serif;
            touch-action: manipulation;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        .heart-text {
            position: absolute;
            /* Позиция будет устанавливаться через JavaScript */
            font-size: clamp(2.8rem, 10vw, 5.6rem);
            font-weight: bold;
            color: #ff9ec1;
            text-shadow: 0 2px 15px rgba(0,0,0,0.15);
            animation: pulse 2s ease-in-out infinite;            
            z-index: 10;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 0.9;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="fireworks"></canvas>
        <div class="heart-text" id="heartText">С 8 МАРТА!</div>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const heartText = document.getElementById('heartText');

        // === ЦЕНТР СЕРДЦА (используется для текста и частиц) ===
        let heartCenterX = 0;
        let heartCenterY = 0;
        // =======================================================

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            heartParticles.length = 0;
            createHeart();
            updateTextPosition(); // Обновляем позицию текста при ресайзе
        });

        const flowerColors = [
            '#ff69b4', '#ff1493', '#ff6b6b', '#ffd93d',
            '#6bcb77', '#4d96ff', '#c56cf0', '#ffb8b8',
            '#ffd3b6', '#d4fc79', '#96e6a1', '#ff9a9e'
        ];

        class Particle {
            constructor(x, y, color, type) {
                this.x = x;                this.y = y;
                this.color = color;
                this.type = type;
                this.size = Math.random() * 5 + 3;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.gravity = 0.05;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.005;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = Math.random() * 0.1 - 0.05;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.alpha -= this.decay;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;

                if (this.type === 'flower') {
                    this.drawFlower();
                } else if (this.type === 'heart') {
                    this.drawHeart();
                } else {
                    this.drawSparkle();
                }

                ctx.restore();
            }

            drawFlower() {
                ctx.fillStyle = this.color;
                const petals = 5;
                for (let i = 0; i < petals; i++) {
                    ctx.beginPath();
                    const angle = (i * 2 * Math.PI) / petals;
                    const x = Math.cos(angle) * this.size;
                    const y = Math.sin(angle) * this.size;
                    ctx.arc(x, y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.beginPath();                ctx.arc(0, 0, this.size / 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700';
                ctx.fill();
            }

            drawHeart() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 2);
                ctx.bezierCurveTo(
                    -this.size / 2, -this.size,
                    -this.size, -this.size / 4,
                    0, this.size / 2
                );
                ctx.bezierCurveTo(
                    this.size, -this.size / 4,
                    this.size / 2, -this.size,
                    0, -this.size / 2
                );
                ctx.fill();
            }

            drawSparkle() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(-this.size / 4, -this.size / 4, this.size / 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Firework {
            constructor(x, y, targetY) {
                this.x = x;
                this.y = y;
                this.targetY = targetY;
                this.speed = 8;
                this.angle = -Math.PI / 2;
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: Math.sin(this.angle) * this.speed
                };
                this.particles = [];
                this.exploded = false;
                this.color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
            }
            update() {
                if (!this.exploded) {
                    this.x += this.velocity.x;
                    this.y += this.velocity.y;
                    this.velocity.y += 0.1;
                    if (this.velocity.y >= 0 || this.y <= this.targetY) {
                        this.explode();
                    }
                }
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update();
                    if (this.particles[i].alpha <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            explode() {
                this.exploded = true;
                const particleCount = 80;
                for (let i = 0; i < particleCount; i++) {
                    const type = Math.random() > 0.3 ? 'flower' : 'sparkle';
                    const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                    this.particles.push(new Particle(this.x, this.y, color, type));
                }
            }

            draw() {
                if (!this.exploded) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.velocity.x * 3, this.y - this.velocity.y * 3);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                this.particles.forEach(particle => particle.draw());
            }
        }

        class HeartParticle {
            constructor(targetX, targetY) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;                this.size = Math.random() * 2.5 + 1.5;
                this.color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                this.speed = 0.04 + Math.random() * 0.02;
                this.alpha = 0;
                this.maxAlpha = Math.random() * 0.4 + 0.4;
            }

            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                if (this.alpha < this.maxAlpha) {
                    this.alpha += 0.008;
                }
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const fireworks = [];
        const heartParticles = [];

        function getHeartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x, y };
        }

        // === ВЫЧИСЛЕНИЕ ВИЗУАЛЬНОГО ЦЕНТРА СЕРДЦА ===
        function getHeartVisualCenter() {
            // Формула сердца асимметрична по Y
            // Верхняя часть (лопасти): y от 0 до ~13
            // Нижняя часть (остриё): y от 0 до ~-23
            // Визуальный центр смещён вверх примерно на 15% от высоты
            const yOffset = -2; // Корректировка для визуального центра
            
            return { x: 0, y: yOffset };
        }
        // ============================================

        function createHeart() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
                        const availableWidth = canvas.width * 0.7;
            const availableHeight = canvas.height * 0.7;
            
            const heartMaxX = 16;
            const heartMaxY = 23;
            
            const scaleX = availableWidth / (2 * heartMaxX);
            const scaleY = availableHeight / (2 * heartMaxY);
            const scale = Math.min(scaleX, scaleY) * 0.95 * 1.4;
            
            // === СОХРАНЯЕМ ЦЕНТР СЕРДЦА С УЧЁТОМ ВИЗУАЛЬНОЙ КОРРЕКТИРОВКИ ===
            const visualCenter = getHeartVisualCenter();
            heartCenterX = centerX + visualCenter.x * scale;
            heartCenterY = centerY + visualCenter.y * scale;
            // ================================================================
            
            for (let i = 0; i < 500; i++) {
                const t = (Math.PI * 2 * i) / 500;
                const point = getHeartPoint(t);
                const targetX = heartCenterX + point.x * scale;
                const targetY = heartCenterY + point.y * scale;
                heartParticles.push(new HeartParticle(targetX, targetY));
            }
        }

        // === ФУНКЦИЯ ОБНОВЛЕНИЯ ПОЗИЦИИ ТЕКСТА ===
        function updateTextPosition() {
            heartText.style.left = heartCenterX + 'px';
            heartText.style.top = heartCenterY + 'px';
        }
        // ==========================================

        createHeart();
        updateTextPosition(); // Устанавливаем позицию текста сразу после создания сердца

        function launchFirework() {
            const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
            const y = canvas.height;
            const targetY = Math.random() * canvas.height * 0.5 + canvas.height * 0.1;
            fireworks.push(new Firework(x, y, targetY));
        }

        setInterval(launchFirework, 800);

        function animate() {
            ctx.fillStyle = 'rgba(126, 161, 236, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            heartParticles.forEach(particle => {
                particle.update();                particle.draw();
            });

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].exploded && fireworks[i].particles.length === 0) {
                    fireworks.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        canvas.addEventListener('click', (e) => {
            fireworks.push(new Firework(e.clientX, canvas.height, e.clientY));
        });
    </script>
</body>
</html>
