<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Clock Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7DA1ED; /* Тот самый голубой */
            --accent: #FDE047;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --clock-main: #FFFFFF;
            --tick-color: rgba(255, 255, 255, 0.4);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent; /* Убираем голубое выделение при тапе */
            user-select: none; /* Запрещаем выделение текста */
        }
        
        body { 
            background: var(--primary); 
            background: radial-gradient(circle at center, #91b3f2 0%, #7DA1ED 100%);
            font-family: 'Manrope', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* SVG Фильтр Жидкого Стекла */
        svg#filters { display: none; }

        /* Оверлей включения звука */
        #audio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }

        /* Основной контейнер */
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px) url(#displacementFilter);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            box-shadow: 
                inset 0 0 25px rgba(255,255,255,0.1),
                0 30px 60px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Режимы корпуса */
        .mode-mechanical { 
            border-radius: 50%; 
            width: min(88vw, 420px);
            height: min(88vw, 420px);
        }

        .mode-digital { 
            border-radius: 40px; 
            width: min(90vw, 440px);
            height: 180px;
        }

        /* Механические элементы */
        .hand {
            position: absolute;
            background-color: var(--clock-main);
            border-radius: 10px;
            z-index: 5;
            transform-origin: 50% 100%;
            transition: opacity 0.3s ease;
        }
        .hand.hour { width: 8px; height: 26%; top: 24%; }
        .hand.minute { width: 5px; height: 36%; top: 14%; }
        .hand.second { width: 2px; height: 42%; background-color: var(--accent); top: 8%; z-index: 6; }

        .clock-center {
            position: absolute;
            width: 16px; height: 16px;
            background: radial-gradient(circle at 30% 30%, #ecf0f1, #2c3e50);
            border-radius: 50%;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: opacity 0.3s ease;
        }

        .clock-face {
            position: absolute;
            width: 100%; height: 100%;
            transition: opacity 0.3s ease;
        }
        .clock-tick { stroke: var(--tick-color); stroke-linecap: round; }
        .clock-tick.hour { stroke: rgba(255,255,255,0.8); stroke-width: 1.5; }

        /* Электронное табло (Улучшенное) */
        .digital-wrapper {
            display: flex;
            align-items: baseline;
            gap: 8px;
            transition: opacity 0.3s ease, transform 0.4s ease;
        }

        .digit-group {
            background: rgba(0,0,0,0.1);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: min(14vw, 4.5rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            min-width: 1.4ch;
            text-align: center;
        }

        .dots { font-size: 3rem; font-weight: 800; animation: blink 1s infinite; opacity: 0.6; }
        @keyframes blink { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.8; } }

        #d-sec { font-size: 1.8rem; color: var(--accent); margin-left: 5px; text-shadow: none; }

        /* Логика скрытия */
        .hidden { opacity: 0 !important; pointer-events: none; transform: scale(0.9); }

        /* Переключатель (Исправлен) */
        .controls {
            margin-top: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(255,255,255,0.1);
            padding: 12px 25px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
        }
        .controls label { font-size: 11px; font-weight: 800; letter-spacing: 2px; cursor: pointer; color: rgba(255,255,255,0.6); transition: 0.3s; }
        input:checked ~ .label-elec { color: var(--accent); }
        input:not(:checked) ~ .label-mech { color: var(--accent); }

        .switch { position: relative; width: 50px; height: 26px; cursor: pointer; }
        .switch input { display: none; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.2); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input:checked + .slider:before { transform: translateX(24px); background: var(--accent); }

    </style>
</head>
<body>

    <svg id="filters">
        <filter id="displacementFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div id="audio-overlay" onclick="enableAudio()">
        <h1 style="font-size: 2rem; margin-bottom: 10px;">Liquid Clock</h1>
        <p style="opacity: 0.7;">Нажми, чтобы запустить</p>
    </div>

    <audio id="clock-audio" src="/audio/clock.mp3" loop></audio>

    <div id="clock-wrapper" class="glass-panel mode-mechanical">
        <svg class="clock-face" viewBox="0 0 100 100"></svg>

        <div class="hand hour" id="hand-hour"></div>
        <div class="hand minute" id="hand-min"></div>
        <div class="hand second" id="hand-sec"></div>
        <div class="clock-center" id="center-dot"></div>

        <div class="digital-wrapper hidden" id="digital-wrapper">
            <div class="digit-group" id="d-hour">00</div>
            <div class="dots">:</div>
            <div class="digit-group" id="d-min">00</div>
            <div id="d-sec">00</div>
        </div>
    </div>

    <div class="controls">
        <label class="label-mech">MECH</label>
        <label class="switch">
            <input type="checkbox" id="mode-switch" onchange="toggleMode()">
            <span class="slider"></span>
        </label>
        <label class="label-elec">ELEC</label>
    </div>

    <script>
        let timeOffset = 0;
        const audio = document.getElementById('clock-audio');
        const wrapper = document.getElementById('clock-wrapper');
        const modeSwitch = document.getElementById('mode-switch');
        
        // Синхронизация
        async function syncTime() {
            try {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                const data = await res.json();
                timeOffset = new Date(data.utc_datetime).getTime() - Date.now();
            } catch(e) {}
        }

        function enableAudio() {
            audio.play().catch(() => {});
            document.getElementById('audio-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('audio-overlay').remove(), 400);
        }

        function initTicks() {
            const svg = document.querySelector('.clock-face');
            for (let i = 0; i < 60; i++) {
                const angle = i * 6 * (Math.PI / 180);
                const isHour = i % 5 === 0;
                const r = 47;
                const len = isHour ? 4 : 1.5;
                const x1 = 50 + Math.sin(angle) * r;
                const y1 = 50 - Math.cos(angle) * r;
                const x2 = 50 + Math.sin(angle) * (r - len);
                const y2 = 50 - Math.cos(angle) * (r - len);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                line.classList.add('clock-tick');
                if (isHour) line.classList.add('hour');
                svg.appendChild(line);
            }
        }

        function toggleMode() {
            const isElec = modeSwitch.checked;
            const mechElements = [
                document.getElementById('hand-hour'),
                document.getElementById('hand-min'),
                document.getElementById('hand-sec'),
                document.getElementById('center-dot'),
                document.querySelector('.clock-face')
            ];
            const digital = document.getElementById('digital-wrapper');

            if (isElec) {
                wrapper.className = 'glass-panel mode-digital';
                mechElements.forEach(el => el.classList.add('hidden'));
                digital.classList.remove('hidden');
            } else {
                wrapper.className = 'glass-panel mode-mechanical';
                mechElements.forEach(el => el.classList.remove('hidden'));
                digital.classList.add('hidden');
            }
        }

        function update() {
            const now = new Date(Date.now() + timeOffset);
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            // Цифровые
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('d-hour').textContent = pad(h);
            document.getElementById('d-min').textContent = pad(m);
            document.getElementById('d-sec').textContent = pad(s);

            // Аналоговые
            const sDeg = (s * 6) + (ms * 0.006);
            const mDeg = (m * 6) + (s * 0.1);
            const hDeg = ((h % 12) * 30) + (m * 0.5);

            document.getElementById('hand-sec').style.transform = `rotate(${sDeg}deg)`;
            document.getElementById('hand-min').style.transform = `rotate(${mDeg}deg)`;
            document.getElementById('hand-hour').style.transform = `rotate(${hDeg}deg)`;

            requestAnimationFrame(update);
        }

        initTicks();
        syncTime();
        update();
    </script>
</body>
</html>
