<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #7DA1ED;
            --accent: #FDE047;
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --clock-main: #FFFFFF;
        }

        [data-theme="dark"] {
            --primary: #161625;
            --accent: #ff6b6b;
            --glass: rgba(0, 0, 0, 0.2);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--primary); 
            background: radial-gradient(circle at center, var(--primary) 0%, #4A69AD 100%);
            font-family: 'Manrope', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* Эффект Liquid Glass */
        .clock-container { 
            background: var(--glass); 
            backdrop-filter: blur(20px) url(#displacementFilter);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 50%; 
            width: min(85vw, 450px);
            height: min(85vw, 450px);
            box-shadow: 
                inset 0 0 30px rgba(255,255,255,0.1),
                0 25px 50px -12px rgba(0, 0, 0, 0.3);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Полноэкранный оверлей */
        #audio-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        /* Стрелки */
        .hand {
            position: absolute;
            background-color: var(--clock-main);
            border-radius: 10px;
            transition: background-color 0.5s ease;
            z-index: 5;
        }

        .hand.hour { width: 8px; height: 25%; transform-origin: 50% 100%; top: 25%; }
        .hand.minute { width: 5px; height: 35%; transform-origin: 50% 100%; top: 15%; }
        .hand.second { width: 2px; height: 40%; background-color: var(--accent); transform-origin: 50% 100%; top: 10%; }

        /* Цифровой дисплей */
        .digital-display {
            position: absolute;
            bottom: 25%;
            display: flex;
            gap: 10px;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--clock-main);
            opacity: 0.8;
            pointer-events: none;
        }
        #d-sec { font-weight: 300; font-size: 1.5rem; align-self: flex-end; margin-bottom: 5px; color: var(--accent); }

        .clock-face {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .clock-tick { stroke: var(--clock-main); opacity: 0.3; }

    </style>
</head>
<body>

    <svg style="display: none">
        <filter id="displacementFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div id="audio-overlay">
        <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 10px;">Включить звук</div>
        <span id="sync-status" style="opacity: 0.6; font-size: 0.9rem;">(Синхронизация...)</span>
    </div>

    <audio id="clock-audio" src="/audio/clock.mp3" preload="auto" loop></audio>

    <div class="clock-container">
        <svg class="clock-face" viewBox="0 0 100 100"></svg>

        <div class="digital-display">
            <span id="d-hour">00</span>
            <span>:</span>
            <span id="d-min">00</span>
            <span id="d-sec">00</span>
        </div>

        <div class="hand hour" id="hand-hour"></div>
        <div class="hand minute" id="hand-min"></div>
        <div class="hand second" id="hand-sec"></div>
    </div>

    <script>
        let timeOffset = 0;
        const audio = document.getElementById('clock-audio');
        const overlay = document.getElementById('audio-overlay');
        const syncStatus = document.getElementById('sync-status');
        let audioEnabled = false;

        // Синхронизация времени
        async function syncServerTime() {
            try {
                const start = Date.now();
                const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
                const data = await response.json();
                const end = Date.now();
                const serverTime = new Date(data.utc_datetime).getTime();
                const latency = (end - start) / 2;
                timeOffset = (serverTime + latency) - end;
                syncStatus.textContent = "(Время синхронизировано)";
            } catch (e) {
                syncStatus.textContent = "(Используется системное время)";
            }
        }

        // Темы
        function updateTheme(hour) {
            const urlParams = new URLSearchParams(window.location.search);
            const manual = urlParams.get('theme');
            const theme = manual || (hour >= 19 || hour < 7 ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        }

        // Управление звуком
        overlay.addEventListener('click', () => {
            audioEnabled = true;
            syncAudio();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.remove(), 500);
        });

        function syncAudio() {
            if (!audioEnabled) return;
            const now = new Date(Date.now() + timeOffset);
            const targetTime = now.getSeconds() + (now.getMilliseconds() / 1000);
            if (Math.abs(audio.currentTime - targetTime) > 0.5) audio.currentTime = targetTime;
            if (audio.paused) audio.play().catch(() => {});
        }

        // Отрисовка делений
        function initTicks() {
            const svg = document.querySelector('.clock-face');
            for (let i = 0; i < 60; i++) {
                if (i % 5 !== 0 && i <= 45) continue;
                const angle = (i * 6) * (Math.PI / 180);
                const isHour = i % 5 === 0;
                const r = 45;
                const len = isHour ? 5 : 2;
                const x1 = 50 + Math.sin(angle) * r;
                const y1 = 50 - Math.cos(angle) * r;
                const x2 = 50 + Math.sin(angle) * (r - len);
                const y2 = 50 - Math.cos(angle) * (r - len);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x1); line.setAttribute("y1", y1);
                line.setAttribute("x2", x2); line.setAttribute("y2", y2);
                line.setAttribute("class", "clock-tick");
                line.setAttribute("stroke-width", isHour ? 1 : 0.5);
                svg.appendChild(line);
            }
        }

        function update() {
            const now = new Date(Date.now() + timeOffset);
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            updateTheme(h);

            // Digital
            document.getElementById('d-hour').textContent = String(h).padStart(2, '0');
            document.getElementById('d-min').textContent = String(m).padStart(2, '0');
            document.getElementById('d-sec').textContent = String(s).padStart(2, '0');

            // Analog
            const sDeg = (s * 6) + (ms * 0.006);
            const mDeg = (m * 6) + (s * 0.1);
            const hDeg = ((h % 12) * 30) + (m * 0.5);

            document.getElementById('hand-sec').style.transform = `rotate(${sDeg}deg)`;
            document.getElementById('hand-min').style.transform = `rotate(${mDeg}deg)`;
            document.getElementById('hand-hour').style.transform = `rotate(${hDeg}deg)`;

            if (audioEnabled && ms < 20) syncAudio();

            requestAnimationFrame(update);
        }

        initTicks();
        syncServerTime();
        update();
    </script>
</body>
</html>
