<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19-sandy Premium Slots</title>
    <style>
        :root {
            --accent: #FDE047;
            --accent-secondary: #38BDF8;
            --bg-base: #749CF9;
            --text-main: #FFFFFF;
            --text-muted: #BAE6FD;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.3);
        }
        
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(253, 224, 71, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.12) 0%, transparent 50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; color: var(--text-main);
        }

        .glass-filter { position: absolute; width: 0; height: 0; }

        /* ЖИДКИЙ ЗАГОЛОВОК */
        h1 { 
            font-weight: 300; letter-spacing: 4px; margin-bottom: 20px;
            text-transform: uppercase; font-size: 2.2rem;
            text-shadow: 0 4px 15px var(--shadow-color);
            background: linear-gradient(135deg, var(--accent), #fff, var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            backdrop-filter: blur(2px) url(#liquid);
        }

        .machine-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) url(#liquid);
            -webkit-backdrop-filter: blur(25px);
            /* УМЕНЬШЕННЫЙ РАЗМЕР КОРПУСА */
            padding: 30px 40px; border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px var(--shadow-color), inset 0 0 25px rgba(255,255,255,0.15);
            display: flex; align-items: center; gap: 30px; position: relative;
        }

        .reels-container {
            display: flex; gap: 12px; background: rgba(0, 0, 0, 0.25);
            padding: 15px; border-radius: 25px; box-shadow: inset 0 5px 20px rgba(0,0,0,0.4);
        }

        .reel {
            /* УМЕНЬШЕННЫЙ РАЗМЕР БАРАБАНОВ */
            width: 80px; height: 110px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid var(--glass-border);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 45px; /* Размер эмодзи */
        }

        .reel span { display: block; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }

        .reel.spinning span {
            animation: blurScroll 0.1s infinite linear;
            filter: blur(6px); opacity: 0.5;
        }

        @keyframes blurScroll {
            0% { transform: translateY(-50px); }
            100% { transform: translateY(50px); }
        }

        /* --- РУЧКА --- */
        .handle-area {
            display: flex; flex-direction: column; align-items: center;
            position: relative; height: 160px; cursor: pointer;
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }

        .handle-base {
            width: 55px; height: 55px; background: var(--glass-bg);
            backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 50%; z-index: 5; position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .handle-lever {
            width: 16px; height: 120px; background: var(--glass-bg);
            backdrop-filter: blur(5px); border: 1px solid var(--glass-border);
            position: absolute; top: 50px; left: 20px;
            transform-origin: top center; transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            border-radius: 0 0 10px 10px; z-index: 1;
        }

        .handle-knob {
            width: 50px; height: 50px; background: var(--glass-bg);
            backdrop-filter: blur(10px) url(#liquid); border: 1px solid var(--glass-border);
            border-radius: 50%; position: absolute; bottom: -25px; left: -17px;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        .handle-area.pulled .handle-lever { transform: rotate(45deg); }

        #status {
            margin-top: 25px; font-size: 24px; font-weight: 600;
            min-height: 40px; text-align: center; opacity: 0; transition: opacity 0.3s;
        }
        #status.visible { opacity: 1; }
        .win-text { color: var(--accent); text-shadow: 0 0 20px rgba(253, 224, 71, 0.6); }
        .lose-text { color: var(--text-muted); }

        @media (max-width: 600px) {
            .machine-wrapper { flex-direction: column; padding: 25px 20px; gap: 25px; }
            .handle-area { flex-direction: row; height: 75px; width: 180px; justify-content: center; }
            .handle-base { margin-right: 12px; }
            .handle-lever { width: 110px; height: 16px; position: relative; top: 0; left: -10px; transform-origin: left center; }
            .handle-knob { bottom: -17px; left: 95px; top: auto; }
            .handle-area.pulled .handle-lever { transform: rotate(40deg) !important; }
            .reel { width: 65px; height: 90px; font-size: 35px; }
        }
    </style>
</head>
<body>

    <svg class="glass-filter">
        <filter id="liquid">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
        </filter>
    </svg>

    <h1>Happy Casino</h1>
    
    <div class="machine-wrapper">
        <div class="reels-container">
            <div class="reel" id="reel1"></div>
            <div class="reel" id="reel2"></div>
            <div class="reel" id="reel3"></div>
        </div>
        
        <div class="handle-area" id="handle" onclick="pullHandle()">
            <div class="handle-base"></div>
            <div class="handle-lever"><div class="handle-knob"></div></div>
        </div>
    </div>
    
    <div id="status">Испытай удачу</div>

    <script>
        // ЗАМЕНА НА ЭМОДЗИ
        const symbols = ['7️⃣', '💎', '🔔', '🍒', '🌟'];
        const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
        const statusDiv = document.getElementById('status');
        const handleDiv = document.getElementById('handle');
        let isSpinning = false;

        function init() {
            reels.forEach(r => r.innerHTML = `<span>${symbols[Math.floor(Math.random()*symbols.length)]}</span>`);
        }

        function pullHandle() {
            if (isSpinning) return;
            isSpinning = true;
            statusDiv.className = "visible lose-text";
            statusDiv.textContent = "Вращение...";
            handleDiv.classList.add('pulled');
            setTimeout(() => handleDiv.classList.remove('pulled'), 600);

            reels.forEach(reel => {
                reel.classList.add('spinning');
                reel.interval = setInterval(() => {
                    reel.innerHTML = `<span>${symbols[Math.floor(Math.random()*symbols.length)]}</span>`;
                }, 100);
            });

            setTimeout(() => stopReel(0, symbols[Math.floor(Math.random()*symbols.length)]), 800);
            setTimeout(() => stopReel(1, symbols[Math.floor(Math.random()*symbols.length)]), 1400);
            setTimeout(() => stopReel(2, symbols[Math.floor(Math.random()*symbols.length)]), 2000);
        }

        function stopReel(index, symbol) {
            const reel = reels[index];
            clearInterval(reel.interval);
            reel.classList.remove('spinning');
            reel.innerHTML = `<span>${symbol}</span>`;
            reel.dataset.res = symbol;
            if (index === 2) {
                isSpinning = false;
                checkResult();
            }
        }

        function checkResult() {
            const res = reels.map(r => r.dataset.res);
            if (res[0] === res[1] && res[1] === res[2]) {
                statusDiv.textContent = "🎉 КРУПНЫЙ ВЫИГРЫШ! 🎉";
                statusDiv.className = "visible win-text";
            } else if (res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) {
                statusDiv.textContent = "✨ 2 Совпадения!";
                statusDiv.className = "visible win-text";
            } else {
                statusDiv.textContent = "Попробуйте еще раз";
                statusDiv.className = "visible lose-text";
            }
        }

        init();
    </script>
</body>
</
