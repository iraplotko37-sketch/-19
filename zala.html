<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>BTV Glass IPTV</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
    --primary: #7DA1ED;
    --accent: #FDE047;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.2);
    --dark: #1e293b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Manrope',sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top, #97b6f1 0%, #7DA1ED 50%, #688de0 100%);
    overflow:hidden;
    color:white;
}

.container{
    display:flex;
    gap:20px;
    width:100%;
    height:100vh;
    padding:20px;
}

.sidebar{
    width:340px;
    background:var(--glass);
    backdrop-filter:blur(24px);
    border:1px solid var(--glass-border);
    border-radius:35px;
    padding:20px;
    overflow:hidden;
    display:flex;    flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.logo{
    font-size:28px;
    font-weight:800;
    margin-bottom:20px;
    color:white;
}

.logo span{
    color:var(--accent);
}

.search{
    width:100%;
    padding:14px 16px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,.12);
    color:white;
    margin-bottom:15px;
    font-size:15px;
}

.search::placeholder{
    color:rgba(255,255,255,.6);
}

.channel-list{
    overflow-y:auto;
    padding-right:5px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.channel-list::-webkit-scrollbar{
    width:4px;
}

.channel-list::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.2);
    border-radius:20px;
}

.channel{
    background:rgba(255,255,255,.08);    border:1px solid rgba(255,255,255,.08);
    padding:12px;
    border-radius:18px;
    cursor:pointer;
    transition:.2s;
    display:flex;
    align-items:center;
    gap:12px;
}

.channel:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,.15);
}

.channel.active{
    border:1px solid var(--accent);
    background:rgba(253,224,71,.18);
}

.channel img{
    width:46px;
    height:46px;
    object-fit:contain;
    border-radius:12px;
    background:white;
    padding:5px;
    /* Оптимизация: плавное появление */
    opacity: 0;
    transition: opacity 0.3s;
}
.channel img.loaded {
    opacity: 1;
}

.channel-info{
    overflow:hidden;
}

.channel-name{
    font-weight:700;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.channel-group{
    font-size:11px;
    opacity:.7;    margin-top:2px;
}

.player-area{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:20px;
    justify-content: center;
}

.player-box{
    flex:none;
    /* ИЗМЕНЕНО: Уменьшена высота плитки */
    height: 50vh; 
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(24px);
    border-radius:40px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.2);
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

.overlay{
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(20px);
    padding:14px 20px;
    border-radius:20px;
}

.current-title{
    font-size:24px;
    font-weight:800;
}

.current-group{
    font-size:13px;
    opacity:.8;    margin-top:4px;
}

.bottom-panel{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(24px);
    border-radius:30px;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    background:var(--accent);
    color:#1e293b;
    padding:12px 20px;
    border-radius:18px;
    font-weight:800;
    cursor:pointer;
    transition:.2s;
    font-size: 14px;
}

.btn:hover{
    transform:scale(1.03);
}

.url-input{
    flex:1;
    min-width:200px;
    border:none;
    outline:none;
    background:rgba(255,255,255,.1);
    padding:12px;
    border-radius:16px;
    color:white;
    font-size: 14px;
}

.status{
    font-size:13px;
    opacity:.75;
}

@media(max-width:900px){
    body{        overflow:auto;
    }

    .container{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        height:400px;
    }

    .player-box{
        min-height:240px;
        height: auto;
        aspect-ratio: 16/9;
    }
}
</style>
</head>
<body>

<div class="container">

        <div class="channel-list" id="channelList"></div>
    </div>

    <div class="player-area">

        <div class="player-box">

            </div>

            <video id="video" controls autoplay playsinline></video>
        </div>

        <div class="bottom-panel">
            <input class="url-input" id="playlistUrl" placeholder="Ссылка на .m3u playlist">
            <button class="btn" onclick="loadPlaylistFromUrl()">Загрузить</button>
            <button class="btn" onclick="toggleFullscreen()">Fullscreen</button>
            <div class="status" id="status">Готово к просмотру</div>        </div>

    </div>
</div>
