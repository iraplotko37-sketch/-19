<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таймер События</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#7DA1ED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Таймер">
    
    <!-- Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Таймер События","short_name":"Таймер","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#7DA1ED","icons":[{"src":"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><rect width=%27192%27 height=%27192%27 fill=%27%237DA1ED%27/><text x=%2796%27 y=%27120%27 font-size=%27100%27 text-anchor=%27middle%27 fill=%27%23FDE047%27 font-weight=%27bold%27>⏱</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
    
    <style>
        /* === CRITICAL CSS === */
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;
            padding:12px;position:relative;
        }
        body::before{
            content:'';position:absolute;inset:0;
            background:radial-gradient(600px at 20% 10%,rgba(125,161,237,0.25),transparent 60%),
                       radial-gradient(500px at 80% 90%,rgba(253,224,71,0.2),transparent 60%);
            pointer-events:none;
        }
        .glass{
            background:rgba(15,23,42,0.92);
            border:2px solid #7DA1ED;border-radius:24px;
            box-shadow:0 0 0 4px rgba(125,161,237,0.15),0 25px 50px rgba(0,0,0,0.5);
        }
        .btn{
            background:#7DA1ED;color:#0f172a;font-weight:800;padding:16px 24px;
            border-radius:16px;border:3px solid #FDE047;cursor:pointer;
            transition:all 0.15s;font-size:16px;width:100%;
            display:flex;align-items:center;justify-content:center;gap:10px;
        }
        .btn:hover{background:#6a8fd9;transform:translateY(-2px);box-shadow:0 10px 30px rgba(125,161,237,0.5)}
        .btn:active{transform:scale(0.98)}
        .btn-yellow{background:#FDE047;border-color:#7DA1ED;color:#0f172a}
        .btn-yellow:hover{background:#fcd34d}
        .btn-success{background:#7DA1ED;border-color:#86efac;color:#86efac;pointer-events:none}
        .input{
            width:100%;background:rgba(30,41,59,0.8);border:2px solid #7DA1ED;
            border-radius:16px;padding:18px 20px;color:#fff;font-size:17px;font-weight:500;            outline:none;transition:border-color 0.2s;
        }
        .input:focus{border-color:#FDE047;box-shadow:0 0 0 4px rgba(253,224,71,0.3)}
        .input::placeholder{color:rgba(255,255,255,0.5)}
        
        /* === BIG TIMER TILES === */
        .timer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0}
        .timer-box{
            background:#7DA1ED;border:3px solid #FDE047;border-radius:20px;
            padding:20px 12px;text-align:center;position:relative;overflow:hidden;
        }
        .timer-box::after{
            content:'';position:absolute;inset:0;border-radius:17px;
            box-shadow:inset 0 0 20px rgba(253,224,71,0.3);pointer-events:none;
        }
        .timer-num{font-size:42px;font-weight:900;line-height:1;color:#0f172a;text-shadow:0 2px 0 rgba(255,255,255,0.3)}
        .timer-label{font-size:12px;color:#0f172a;font-weight:800;text-transform:uppercase;margin-top:8px;letter-spacing:0.5px}
        
        .fade-in{animation:fadeIn 0.25s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s}
        .modal.active{opacity:1;pointer-events:all}
        .modal-content{transform:scale(0.95);transition:transform 0.2s}
        .modal.active .modal-content{transform:scale(1)}
        
        .step{display:flex;gap:14px;align-items:flex-start;margin:16px 0;padding:12px;background:rgba(125,161,237,0.15);border:2px solid #7DA1ED;border-radius:14px}
        .step-num{min-width:28px;height:28px;border-radius:50%;background:#FDE047;color:#0f172a;font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid #7DA1ED}
        
        .hidden{display:none!important}
        .pulse{animation:pulse 1.8s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(253,224,71,0.5)}50%{box-shadow:0 0 0 15px rgba(253,224,71,0)}}
        
        .status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:#7DA1ED;border:2px solid #FDE047;border-radius:16px;margin-bottom:18px}
        .status-dot{width:12px;height:12px;border-radius:50%;background:#FDE047;box-shadow:0 0 0 3px rgba(253,224,71,0.4);animation:blink 1.5s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}
        .status-text{font-weight:700;color:#0f172a;font-size:14px}
        
        @media(max-width:480px){
            .timer-num{font-size:36px}
            .timer-box{padding:16px 8px}
            .timer-grid{gap:10px}
        }
    </style>
</head>
<body>
    <main class="relative z-10 w-full max-w-lg">
        <!-- Setup -->
        <section id="setup" class="glass p-7 fade-in">
            <div class="status-bar">                <div class="status-dot"></div>
                <span class="status-text">Готов к запуску</span>
            </div>
            <h1 class="text-2xl font-black text-center mb-2" style="color:#FDE047">⏱ ТАЙМЕР</h1>
            <p class="text-center text-sm opacity-80 mb-7">До важного события</p>
            
            <div class="space-y-5">
                <input type="text" id="name" class="input" placeholder="Название события" maxlength="30">
                <input type="datetime-local" id="date" class="input">
                <button class="btn" onclick="start()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#0f172a"><path d="M8 5v14l11-7z"/></svg>
                    ЗАПУСТИТЬ
                </button>
            </div>
        </section>

        <!-- Countdown -->
        <section id="countdown" class="hidden glass p-6 text-center fade-in">
            <div class="flex justify-between items-start mb-5">
                <div class="text-left">
                    <h2 id="evtName" class="font-black text-xl truncate max-w-[200px]" style="color:#FDE047">СОБЫТИЕ</h2>
                    <p id="evtDate" class="text-xs opacity-70 mt-1">--.--.----</p>
                </div>
                <button onclick="reset()" class="opacity-70 hover:opacity-100 p-2 transition" style="color:#7DA1ED">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
            </div>

            <!-- BIG TIMER TILES -->
            <div class="timer-grid">
                <div class="timer-box"><span id="d" class="timer-num">00</span><div class="timer-label">ДНЕЙ</div></div>
                <div class="timer-box"><span id="h" class="timer-num">00</span><div class="timer-label">ЧАСОВ</div></div>
                <div class="timer-box"><span id="m" class="timer-num">00</span><div class="timer-label">МИН</div></div>
                <div class="timer-box"><span id="s" class="timer-num">00</span><div class="timer-label">СЕКУНД</div></div>
            </div>

            <div class="status-bar" style="margin:20px 0">
                <div class="status-dot"></div>
                <span class="status-text">Уведомления активны</span>
            </div>

            <div class="space-y-3">
                <button id="notifBtn" class="btn btn-yellow pulse" onclick="requestNotif()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#0f172a"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    ВКЛЮЧИТЬ УВЕДОМЛЕНИЯ
                </button>
                <button id="installBtn" class="btn" onclick="showInstall()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="#0f172a"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    НА ГЛАВНЫЙ ЭКРАН
                </button>            </div>
        </section>
    </main>

    <!-- Install Modal -->
    <div id="modal" class="modal" onclick="if(event.target===this)closeInstall()">
        <div class="glass modal-content p-6 max-w-sm w-full" style="border-color:#FDE047">
            <h3 class="font-black text-lg mb-4 text-center" style="color:#FDE047">📲 УСТАНОВКА</h3>
            <div class="text-sm space-y-3">
                <div class="step"><span class="step-num">1</span><span>Нажмите <b>«Поделиться"</b> (iPhone) или <b>⋮</b> (Android)</span></div>
                <div class="step"><span class="step-num">2</span><span>Выберите <b>"На экран «Домой»"</b></span></div>
                <div class="step"><span class="step-num">3</span><span>Таймер всегда под рукой! ✨</span></div>
            </div>
            <button class="btn btn-yellow mt-5" onclick="closeInstall()">ПОНЯТНО</button>
        </div>
    </div>

    <script>
        // === OPTIMIZED JS ===
        let timer, target, notifInterval;
        const $ = id => document.getElementById(id);
        const colors = {blue:'#7DA1ED', yellow:'#FDE047', dark:'#0f172a'};
        
        // Load saved data
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('evt');
            if (saved) {
                const {name, date} = JSON.parse(saved);
                $('name').value = name;
                $('date').value = date;
                start(false);
            }
            // Register minimal Service Worker for notifications
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                    self.addEventListener('notificationclick', e => {
                        e.notification.close();
                        if (e.action === 'view') {
                            e.waitUntil(clients.openWindow(self.registration.scope));
                        }
                        if (e.action === 'snooze') {
                            // Could implement snooze logic here
                        }
                    });
                `;
                const blob = new Blob([swCode], {type:'application/javascript'});
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl).catch(()=>{});            }
        });

        function start(showSetup = true) {
            const name = $('name').value.trim() || 'СОБЫТИЕ';
            const date = $('date').value;
            if (!date) return alert('Выберите дату!');
            
            target = new Date(date).getTime();
            localStorage.setItem('evt', JSON.stringify({name, date}));
            
            $('evtName').textContent = name.toUpperCase();
            $('evtDate').textContent = new Date(date).toLocaleDateString('ru-RU', {
                day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'
            });
            
            if (showSetup) {
                $('setup').classList.add('hidden');
                $('countdown').classList.remove('hidden');
            }
            
            clearInterval(timer);
            clearInterval(notifInterval);
            update();
            timer = setInterval(update, 1000);
            
            // Start notification updater if permission granted
            if (Notification.permission === 'granted') startNotifUpdates(name);
        }

        function update() {
            const dist = target - Date.now();
            if (dist < 0) {
                clearInterval(timer);
                ['d','h','m','s'].forEach(id => $(id).textContent = '00');
                $('evtName').textContent = $('evtName').textContent + ' ✓';
                if (Notification.permission === 'granted') {
                    new Notification('Событие наступило! 🎉', {
                        body: $('evtName').textContent,
                        icon: getIconSVG(), tag:'countdown', renotify:true
                    });
                }
                return;
            }
            const d = Math.floor(dist/864e5),
                  h = Math.floor(dist%864e5/36e5),
                  m = Math.floor(dist%36e5/6e4),
                  s = Math.floor(dist%6e4/1000);
            ['d','h','m','s'].forEach((id,i) => {
                const val = [d,h,m,s][i];                $(id).textContent = String(val).padStart(2,'0');
            });
        }

        function reset() {
            localStorage.removeItem('evt');
            clearInterval(timer);
            clearInterval(notifInterval);
            location.reload();
        }

        // === INTERACTIVE PERSISTENT NOTIFICATIONS ===
        function getIconSVG() {
            return 'data:image/svg+xml,'+encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
                    <rect width="192" height="192" fill="${colors.blue}"/>
                    <text x="96" y="120" font-size="90" text-anchor="middle" fill="${colors.yellow}" font-weight="bold">⏱</text>
                </svg>
            `);
        }

        function getNotifBody() {
            const dist = target - Date.now();
            if (dist < 0) return 'Событие уже наступило! 🎉';
            const d = Math.floor(dist/864e5),
                  h = Math.floor(dist%864e5/36e5),
                  m = Math.floor(dist%36e5/6e4);
            if (d > 0) return `Осталось: ${d}д ${h}ч ${m}м`;
            if (h > 0) return `Осталось: ${h}ч ${m}м`;
            return `Осталось: ${m}мин`;
        }

        function startNotifUpdates(eventName) {
            // Update notification every 30 seconds
            notifInterval = setInterval(() => {
                if (document.hidden && Notification.permission === 'granted') {
                    new Notification(`⏱ ${eventName}`, {
                        body: getNotifBody(),
                        icon: getIconSVG(),
                        tag: 'countdown',
                        renotify: true,
                        requireInteraction: true,
                        actions: [
                            {action: 'view', title: 'Открыть'},
                            {action: 'snooze', title: 'Напомнить позже'}
                        ]
                    });
                }
            }, 30000);
            // Initial notification            new Notification(`⏱ ${eventName}`, {
                body: getNotifBody(),
                icon: getIconSVG(),
                tag: 'countdown',
                requireInteraction: true,
                actions: [
                    {action: 'view', title: 'Открыть'},
                    {action: 'snooze', title: 'Напомнить позже'}
                ]
            });
        }

        function requestNotif() {
            if (!('Notification' in window)) return alert('Браузер не поддерживает уведомления');
            
            Notification.requestPermission().then(p => {
                const btn = $('notifBtn');
                if (p === 'granted') {
                    btn.textContent = '✓ УВЕДОМЛЕНИЯ АКТИВНЫ';
                    btn.className = 'btn btn-success';
                    btn.classList.remove('pulse');
                    
                    const name = $('evtName').textContent;
                    startNotifUpdates(name);
                    
                    // Show initial notification
                    new Notification('Таймер активирован! ⏱', {
                        body: 'Уведомления будут обновляться автоматически',
                        icon: getIconSVG(),
                        requireInteraction: true,
                        actions: [
                            {action: 'view', title: 'Открыть таймер'},
                            {action: 'settings', title: 'Настройки'}
                        ]
                    });
                } else {
                    alert('Разрешите уведомления для автоматического отслеживания');
                }
            });
        }

        // === PWA INSTALL ===
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
        });

        async function showInstall() {
            if (deferredPrompt) {                deferredPrompt.prompt();
                const {outcome} = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    $('installBtn').textContent = '✓ УСТАНОВЛЕНО';
                    $('installBtn').className = 'btn btn-success';
                }
                deferredPrompt = null;
            } else {
                const modal = $('modal');
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
            }
        }

        function closeInstall() {
            const modal = $('modal');
            modal.classList.remove('active');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // Hide install button if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            $('installBtn').classList.add('hidden');
        }

        // Page visibility: show notification when tab is hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && Notification.permission === 'granted' && target) {
                const name = $('evtName').textContent;
                new Notification(`⏱ ${name}`, {
                    body: getNotifBody(),
                    icon: getIconSVG(),
                    tag: 'countdown',
                    renotify: true,
                    requireInteraction: true,
                    actions: [
                        {action: 'view', title: 'Открыть'},
                        {action: 'snooze', title: 'Позже'}
                    ]
                });
            }
        });
    </script>
</body>
</html>
