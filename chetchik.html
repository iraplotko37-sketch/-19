<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Timer</title>
    
    <meta name="theme-color" content="#7DA1ED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Таймер","short_name":"Таймер","start_url":".","display":"standalone","background_color":"#7DA1ED","theme_color":"#7DA1ED","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3652/3652191.png","sizes":"512x512","type":"image/png"}]}'>

    <style>
        :root { 
            --primary: #7DA1ED; 
            --accent: #FDE047; 
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--primary); 
            font-family: system-ui, -apple-system, sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
            overflow: hidden;
        }

        /* Эффект Liquid Glass */
        .card { 
            background: var(--glass); 
            backdrop-filter: blur(15px) url(#displacementFilter);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            border-radius: 32px; 
            width: 100%;
            max-width: 380px;
            box-shadow: 
                inset 0 0 20px rgba(255,255,255,0.1),
                0 25px 50px -12px rgba(0, 0, 0, 0.2);
            padding: 32px;
            position: relative;
            text-align: center;
        }

        h1 { font-size: 24px; font-weight: 900; margin-bottom: 24px; }
        h2 { font-size: 16px; font-weight: 600; opacity: 0.7; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.1em; }

        .input-field { 
            width: 100%;
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 16px; 
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 12px;
        }
        .input-field:focus { border-color: var(--accent); background: rgba(255,255,255,0.25); transform: translateY(-1px); }

        .btn-main { 
            width: 100%;
            background: var(--accent); 
            color: #4A4A22; 
            font-weight: 800; 
            padding: 18px;
            border-radius: 18px; 
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        .btn-notif {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px;
            border-radius: 14px;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
        }

        .timer-display { display: flex; justify-content: center; align-items: baseline; gap: 6px; margin-bottom: 30px; }
        #w-days { font-size: 110px; font-weight: 900; color: var(--accent); letter-spacing: -0.05em; line-height: 0.9; }
        .unit-main { font-size: 22px; font-weight: 800; opacity: 0.8; }

        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 35px; }
        .stat-card { 
            background: rgba(255,255,255,0.1); 
            border-radius: 18px; 
            padding: 14px 5px; 
            border: 1px solid rgba(255,255,255,0.15);
        }
        .stat-val { font-size: 22px; font-weight: 800; }
        .stat-label { font-size: 9px; font-weight: 700; text-transform: uppercase; opacity: 0.5; margin-top: 4px; }

        .hidden { display: none !important; }
        .reset-btn { 
            background: none; border: none; border-bottom: 1px solid white; 
            color: white; opacity: 0.4; font-size: 11px; text-transform: uppercase; 
            cursor: pointer; transition: 0.2s;
        }
        .reset-btn:hover { opacity: 1; }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }
    </style>
</head>
<body>

    <svg style="display: none">
        <filter id="displacementFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div id="setup" class="card">
        <h1>Новое событие</h1>
        <button id="notif-btn" onclick="enableNotifs()" class="btn-notif">🔔 Включить уведомления</button>
        <input type="text" id="name" placeholder="Что ждем?" class="input-field">
        <input type="date" id="date" class="input-field">
        <button onclick="save()" class="btn-main">Создать таймер</button>
    </div>

    <div id="widget" class="hidden card">
        <h2 id="w-name">Событие</h2>
        <div class="timer-display">
            <span id="w-days">0</span>
            <span class="unit-main">дн</span>
        </div>
        <div class="grid-stats">
            <div class="stat-card"><div id="w-hours" class="stat-val">00</div><div class="stat-label">часов</div></div>
            <div class="stat-card"><div id="w-mins" class="stat-val">00</div><div class="stat-label">минут</div></div>
            <div class="stat-card"><div id="w-secs" class="stat-val">00</div><div class="stat-label">секунд</div></div>
        </div>
        <button onclick="reset()" class="reset-btn">Сбросить всё</button>
    </div>

    <script>
        const store = {
            set: (data) => localStorage.setItem('liquid_timer', JSON.stringify(data)),
            get: () => JSON.parse(localStorage.getItem('liquid_timer'))
        };

        let timerInterval;

        async function enableNotifs() {
            if (!("Notification" in window)) return alert("Браузер не поддерживает уведомления.");
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('notif-btn').classList.add('hidden');
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification("Таймер", { body: "Уведомления активны!", icon: "https://cdn-icons-png.flaticon.com/512/3652/3652191.png" });
                });
            }
        }

        function sendPush(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(title, {
                        body: body,
                        tag: 'timer-msg',
                        icon: 'https://cdn-icons-png.flaticon.com/512/3652/3652191.png',
                        silent: true
                    });
                });
            }
        }

        function save() {
            const nameInput = document.getElementById('name').value;
            const dateInput = document.getElementById('date').value;
            if (!dateInput) return alert('Выбери дату!');

            const targetDate = new Date(dateInput);
            targetDate.setHours(0, 0, 0, 0);

            const eventData = { name: nameInput || 'Событие', date: targetDate.getTime() };
            store.set(eventData);
            startWidget(eventData);
        }

        function update() {
            const data = store.get();
            if (!data) return;

            const diff = data.date - Date.now();
            
            if (diff <= 0) {
                ['w-days','w-hours','w-mins','w-secs'].forEach(id => document.getElementById(id).textContent = id === 'w-days' ? '0' : '00');
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('w-days').textContent = d;
            document.getElementById('w-hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('w-mins').textContent = m.toString().padStart(2, '0');
            document.getElementById('w-secs').textContent = s.toString().padStart(2, '0');

            if (document.hidden && s === 0) {
                sendPush(data.name, `Осталось: ${d}д ${h}ч ${m}м`);
            }
        }

        function startWidget(data) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('widget').classList.remove('hidden');
            document.getElementById('w-name').textContent = data.name;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(update, 1000);
            update();
        }

        function reset() {
            if (confirm('Удалить?')) {
                clearInterval(timerInterval);
                localStorage.removeItem('liquid_timer');
                location.reload();
            }
        }

        window.onload = () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch",()=>{})');
            }
            if (Notification.permission === "granted") {
                const nBtn = document.getElementById('notif-btn');
                if (nBtn) nBtn.classList.add('hidden');
            }
            const today = new Date().toISOString().split("T")[0];
            document.getElementById('date').setAttribute('min', today);
            const savedData = store.get();
            if (savedData) startWidget(savedData);
        };
    </script>
</body>
</html>
