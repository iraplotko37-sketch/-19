<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таймер событий</title>
    
    <meta name="theme-color" content="#7DA1ED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href='data:application/manifest+json,{"name":"Таймер","short_name":"Таймер","start_url":".","display":"standalone","background_color":"#7DA1ED","theme_color":"#7DA1ED","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3652/3652191.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #7DA1ED; --accent: #FDE047; }
        body { background: var(--primary); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); }
        .input-field { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); outline: none; transition: 0.2s; color: white; }
        .input-field:focus { background: rgba(255,255,255,0.3); border-color: var(--accent); }
        .btn-main { background: var(--accent); color: #4A4A22; font-weight: 800; transition: all 0.2s; }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }
        .hidden { display: none !important; }
        
        /* Исправление отображения даты в Safari/Chrome */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6 text-white">

    <div id="setup" class="w-full max-w-sm card rounded-3xl p-8 shadow-2xl">
        <h1 class="text-2xl font-black mb-6 text-center">Новое событие</h1>
        <input type="text" id="name" placeholder="Что ждем?" class="w-full input-field rounded-xl px-4 py-3 mb-3 placeholder-blue-100">
        <input type="date" id="date" class="w-full input-field rounded-xl px-4 py-3 mb-6 [color-scheme:dark]">
        <button onclick="save()" class="w-full btn-main py-4 rounded-2xl shadow-lg uppercase tracking-wider">Создать таймер</button>
    </div>

    <div id="widget" class="hidden w-full max-w-sm text-center">
        <h2 id="w-name" class="text-lg font-medium opacity-80 mb-1 uppercase tracking-widest">Событие</h2>
        
        <div class="flex justify-center items-baseline gap-2 mb-8">
            <span id="w-days" class="text-9xl font-black tabular-nums tracking-tighter text-[#FDE047]">0</span>
            <span class="text-2xl font-bold opacity-80">дн</span>
        </div>
        
        <div class="grid grid-cols-3 gap-4 mb-10">
            <div class="card rounded-2xl py-4">
                <div id="w-hours" class="text-3xl font-bold">00</div>
                <div class="text-[10px] uppercase opacity-60 font-bold mt-1">часов</div>
            </div>
            <div class="card rounded-2xl py-4">
                <div id="w-mins" class="text-3xl font-bold">00</div>
                <div class="text-[10px] uppercase opacity-60 font-bold mt-1">минут</div>
            </div>
            <div class="card rounded-2xl py-4">
                <div id="w-secs" class="text-3xl font-bold">00</div>
                <div class="text-[10px] uppercase opacity-60 font-bold mt-1">секунд</div>
            </div>
        </div>

        <button onclick="reset()" class="opacity-40 hover:opacity-100 transition-opacity text-xs border-b border-white pb-1 uppercase tracking-widest">Сбросить всё</button>
    </div>

    <script>
        const store = {
            set: (data) => localStorage.setItem('event_timer', JSON.stringify(data)),
            get: () => JSON.parse(localStorage.getItem('event_timer'))
        };

        let timerInterval;

        function save() {
            const nameInput = document.getElementById('name').value;
            const dateInput = document.getElementById('date').value;
            
            if (!dateInput) return alert('Пожалуйста, выбери дату!');

            // ФИКС: Всегда считаем до 00:00:00 выбранного дня
            const targetDate = new Date(dateInput);
            targetDate.setHours(0, 0, 0, 0);

            const eventData = {
                name: nameInput || 'Важное событие',
                date: targetDate.getTime()
            };

            store.set(eventData);
            startWidget(eventData);
        }

        function reset() {
            if (confirm('Удалить таймер?')) {
                clearInterval(timerInterval);
                localStorage.removeItem('event_timer');
                location.reload();
            }
        }

        function update() {
            const data = store.get();
            if (!data) return;

            const diff = data.date - Date.now();
            
            if (diff <= 0) {
                document.getElementById('w-days').textContent = '0';
                document.getElementById('w-hours').textContent = '00';
                document.getElementById('w-mins').textContent = '00';
                document.getElementById('w-secs').textContent = '00';
                document.title = "Свершилось!";
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('w-days').textContent = d;
            document.getElementById('w-hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('w-mins').textContent = m.toString().padStart(2, '0');
            document.getElementById('w-secs').textContent = s.toString().padStart(2, '0');
            
            document.title = `${d}д. до ${data.name}`;
        }

        function startWidget(data) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('widget').classList.remove('hidden');
            document.getElementById('w-name').textContent = data.name;
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(update, 1000);
            update();
        }

        function init() {
            // Ограничиваем выбор даты сегодняшним днем (нельзя выбрать прошлое)
            const today = new Date().toISOString().split("T")[0];
            document.getElementById('date').setAttribute('min', today);

            const savedData = store.get();
            if (savedData) {
                startWidget(savedData);
            }
        }

        init();

        // Service Worker (оставляем твой для PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch",()=>{})');
        }
    </script>
</body>
</html>
