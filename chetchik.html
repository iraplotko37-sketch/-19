<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таймер событий</title>
    
    <meta name="theme-color" content="#7DA1ED">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <style>
        :root { 
            --primary: #7DA1ED; 
            --accent: #FDE047; 
            --white-20: rgba(255, 255, 255, 0.2);
            --white-15: rgba(255, 255, 255, 0.15);
        }

        /* Базовые настройки как в Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--primary); 
            font-family: system-ui, -apple-system, sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 24px;
            overflow: hidden;
        }

        /* Карточка с эффектом стекла */
        .card { 
            background: var(--white-15); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 24px; /* rounded-3xl */
            width: 100%;
            max-width: 384px;
        }

        /* Заголовки */
        h1 { font-size: 24px; font-weight: 900; margin-bottom: 24px; text-align: center; }
        h2 { font-size: 18px; font-weight: 500; opacity: 0.8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.1em; }

        /* Поля ввода */
        .input-field { 
            width: 100%;
            background: var(--white-20); 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 12px; /* rounded-xl */
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .input-field:focus { border-color: var(--accent); background: rgba(255,255,255,0.3); }
        .input-field::placeholder { color: #d1d5db; }

        /* Кнопка */
        .btn-main { 
            width: 100%;
            background: var(--accent); 
            color: #4A4A22; 
            font-weight: 800; 
            padding: 16px;
            border-radius: 16px; /* rounded-2xl */
            border: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }
        .btn-main:active { transform: scale(0.95); opacity: 0.9; }

        /* Таймер */
        .timer-display { display: flex; justify-content: center; align-items: baseline; gap: 8px; margin-bottom: 32px; }
        #w-days { font-size: 120px; font-weight: 900; color: var(--accent); letter-spacing: -0.05em; line-height: 1; }
        .unit-main { font-size: 24px; font-weight: 700; opacity: 0.8; }

        /* Сетка мелких блоков */
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
        .stat-card { 
            background: var(--white-15); 
            border-radius: 16px; 
            padding: 16px 8px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-val { font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.6; margin-top: 4px; }

        /* Утилиты */
        .hidden { display: none !important; }
        .reset-btn { 
            background: none; border: none; border-bottom: 1px solid white; 
            color: white; opacity: 0.4; font-size: 12px; text-transform: uppercase; 
            letter-spacing: 0.1em; cursor: pointer; transition: 0.2s;
        }
        .reset-btn:hover { opacity: 1; }

        /* Фикс для календаря */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }
    </style>
</head>
<body>

    <div id="setup" class="card" style="padding: 32px;">
        <h1>Новое событие</h1>
        <input type="text" id="name" placeholder="Что ждем?" class="input-field">
        <input type="date" id="date" class="input-field" style="margin-bottom: 24px;">
        <button onclick="save()" class="btn-main">Создать таймер</button>
    </div>

    <div id="widget" class="hidden" style="width: 100%; max-width: 384px; text-align: center;">
        <h2 id="w-name">Событие</h2>
        
        <div class="timer-display">
            <span id="w-days">0</span>
            <span class="unit-main">дн</span>
        </div>
        
        <div class="grid-stats">
            <div class="stat-card">
                <div id="w-hours" class="stat-val">00</div>
                <div class="stat-label">часов</div>
            </div>
            <div class="stat-card">
                <div id="w-mins" class="stat-val">00</div>
                <div class="stat-label">минут</div>
            </div>
            <div class="stat-card">
                <div id="w-secs" class="stat-val">00</div>
                <div class="stat-label">секунд</div>
            </div>
        </div>

        <button onclick="reset()" class="reset-btn">Сбросить всё</button>
    </div>

    <script>
        const store = {
            set: (data) => localStorage.setItem('event_timer', JSON.stringify(data)),
            get: () => JSON.parse(localStorage.getItem('event_timer'))
        };

        let timerInterval;

        function save() {
            const nameInput = document.getElementById('name').value;
            const dateInput = document.getElementById('date').value;
            if (!dateInput) return alert('Пожалуйста, выбери дату!');

            const targetDate = new Date(dateInput);
            targetDate.setHours(0, 0, 0, 0);

            const eventData = {
                name: nameInput || 'Важное событие',
                date: targetDate.getTime()
            };

            store.set(eventData);
            startWidget(eventData);
        }

        function reset() {
            if (confirm('Удалить таймер?')) {
                clearInterval(timerInterval);
                localStorage.removeItem('event_timer');
                location.reload();
            }
        }

        function update() {
            const data = store.get();
            if (!data) return;

            const diff = data.date - Date.now();
            
            if (diff <= 0) {
                ['w-days','w-hours','w-mins','w-secs'].forEach(id => document.getElementById(id).textContent = id === 'w-days' ? '0' : '00');
                document.title = "Свершилось!";
                return;
            }

            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('w-days').textContent = d;
            document.getElementById('w-hours').textContent = h.toString().padStart(2, '0');
            document.getElementById('w-mins').textContent = m.toString().padStart(2, '0');
            document.getElementById('w-secs').textContent = s.toString().padStart(2, '0');
            document.title = `${d}д. до ${data.name}`;
        }

        function startWidget(data) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('widget').classList.remove('hidden');
            document.getElementById('w-name').textContent = data.name;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(update, 1000);
            update();
        }

        window.onload = () => {
            const today = new Date().toISOString().split("T")[0];
            document.getElementById('date').setAttribute('min', today);
            const savedData = store.get();
            if (savedData) startWidget(savedData);
        };
    </script>
</body>
</html>
