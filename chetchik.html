<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Таймер События</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#7DA1ED">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Таймер">
    
    <!-- Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"Таймер События","short_name":"Таймер","start_url":".","display":"standalone","background_color":"#0f172a","theme_color":"#7DA1ED","icons":[{"src":"data:image/svg+xml,<svg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 192 192%27><circle cx=%2796%27 cy=%2796%27 r=%2788%27 fill=%27%237DA1ED%27/><text x=%2796%27 y=%27110%27 font-size=%2780%27 text-anchor=%27middle%27 fill=%27%23FDE047%27 font-weight=%27bold%27>⏱</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <style>
        /* === CRITICAL CSS - INLINE & MINIFIED === */
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;overflow:hidden}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
            background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
            color:#fff;
            display:flex;align-items:center;justify-content:center;
            padding:16px;position:relative;
        }
        body::before{
            content:'';position:absolute;inset:0;
            background:radial-gradient(circle at 30% 20%,rgba(125,161,237,0.15) 0%,transparent 50%),
                       radial-gradient(circle at 70% 80%,rgba(253,224,71,0.1) 0%,transparent 50%);
            pointer-events:none;z-index:0;
        }
        .glass{
            background:rgba(30,41,59,0.85);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border:1px solid rgba(125,161,237,0.3);
            border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.4);
        }
        .btn{
            background:linear-gradient(135deg,#7DA1ED,#6a8fd9);
            color:#0f172a;font-weight:700;padding:14px 20px;border-radius:14px;
            border:none;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s;
            display:flex;align-items:center;justify-content:center;gap:8px;
            font-size:15px;width:100%;
        }
        .btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(125,161,237,0.4)}        .btn:active{transform:scale(0.98)}
        .btn-outline{
            background:rgba(253,224,71,0.15);border:1px solid rgba(253,224,71,0.4);
            color:#FDE047;font-weight:600;
        }
        .btn-outline:hover{background:rgba(253,224,71,0.25)}
        .btn-success{
            background:rgba(34,197,94,0.2);border-color:rgba(34,197,94,0.5);
            color:#86efac;pointer-events:none;
        }
        .input{
            width:100%;background:rgba(15,23,42,0.6);border:1px solid rgba(125,161,237,0.4);
            border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;
            outline:none;transition:border-color 0.2s;
        }
        .input:focus{border-color:#FDE047;box-shadow:0 0 0 3px rgba(253,224,71,0.2)}
        .input::placeholder{color:rgba(255,255,255,0.4)}
        .timer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:24px 0}
        .timer-box{
            background:rgba(15,23,42,0.5);border:1px solid rgba(125,161,237,0.2);
            border-radius:14px;padding:12px 8px;text-align:center;
        }
        .timer-num{font-size:28px;font-weight:800;line-height:1}
        .timer-num.days{color:#7DA1ED}.timer-num.hours{color:#93c5fd}
        .timer-num.mins{color:#FDE047}.timer-num.secs{color:#86efac}
        .timer-label{font-size:10px;color:rgba(255,255,255,0.6);text-transform:uppercase;font-weight:600;margin-top:6px}
        .fade-in{animation:fadeIn 0.3s ease-out}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.25s}
        .modal.active{opacity:1;pointer-events:all}
        .modal-content{transform:scale(0.95);transition:transform 0.25s}
        .modal.active .modal-content{transform:scale(1)}
        .step{display:flex;gap:12px;align-items:flex-start;margin:14px 0}
        .step-num{min-width:24px;height:24px;border-radius:50%;background:#7DA1ED;color:#0f172a;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
        .hidden{display:none!important}
        .pulse{animation:pulse 2s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(253,224,71,0.4)}70%{box-shadow:0 0 0 12px rgba(253,224,71,0)}100%{box-shadow:0 0 0 0 rgba(253,224,71,0)}}
        @media(max-width:480px){.timer-num{font-size:24px}.timer-grid{gap:8px}}
    </style>
</head>
<body>
    <main class="relative z-10 w-full max-w-md">
        <!-- Setup -->
        <section id="setup" class="glass p-6 fade-in">
            <h1 class="text-2xl font-bold text-center mb-1" style="color:#FDE047">⏱ Таймер события</h1>
            <p class="text-center text-sm text-slate-300 mb-6">Отслеживайте дни до важного</p>
            
            <div class="space-y-4">
                <input type="text" id="name" class="input" placeholder="Название события" maxlength="30">
                <input type="datetime-local" id="date" class="input">                <button class="btn" onclick="start()">▶ Запустить таймер</button>
            </div>
        </section>

        <!-- Countdown -->
        <section id="countdown" class="hidden glass p-5 text-center fade-in">
            <div class="flex justify-between items-start mb-4">
                <div class="text-left">
                    <h2 id="evtName" class="font-bold text-lg truncate max-w-[180px]">Событие</h2>
                    <p id="evtDate" class="text-xs text-slate-400 mt-0.5">--.--.----</p>
                </div>
                <button onclick="reset()" class="text-slate-400 hover:text-white p-1.5">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
            </div>

            <div class="timer-grid">
                <div class="timer-box"><span id="d" class="timer-num days">00</span><div class="timer-label">Дней</div></div>
                <div class="timer-box"><span id="h" class="timer-num hours">00</span><div class="timer-label">Часов</div></div>
                <div class="timer-box"><span id="m" class="timer-num mins">00</span><div class="timer-label">Мин</div></div>
                <div class="timer-box"><span id="s" class="timer-num secs">00</span><div class="timer-label">Сек</div></div>
            </div>

            <div class="space-y-2.5">
                <button id="notifBtn" class="btn btn-outline pulse" onclick="requestNotif()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    Уведомления
                </button>
                <button id="installBtn" class="btn btn-outline" onclick="showInstall()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    На главный экран
                </button>
            </div>
        </section>
    </main>

    <!-- Install Modal -->
    <div id="modal" class="modal" onclick="if(event.target===this)closeInstall()">
        <div class="glass modal-content p-5 max-w-sm w-full">
            <h3 class="font-bold text-lg mb-3" style="color:#FDE047">📲 Как установить</h3>
            <div class="text-sm text-slate-300 space-y-3">
                <div class="step"><span class="step-num">1</span><span>Нажмите <b>«Поделиться"</b> (iPhone) или <b>⋮</b> (Android)</span></div>
                <div class="step"><span class="step-num">2</span><span>Выберите <b>"На экран «Домой»"</b> или <b>"Установить"</b></span></div>
                <div class="step"><span class="step-num">3</span><span>Готово! Таймер всегда под рукой ✨</span></div>
            </div>
            <button class="btn mt-4" onclick="closeInstall()">Понятно</button>
        </div>
    </div>

    <script>        // === OPTIMIZED JS - NO EXTERNAL DEPS ===
        let timer, target;
        const $ = id => document.getElementById(id);
        
        // Load saved data instantly
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('evt');
            if (saved) {
                const {name, date} = JSON.parse(saved);
                $('name').value = name;
                $('date').value = date;
                start(false); // Auto-start without animation
            }
            // Register SW for offline
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:application/javascript,'+encodeURIComponent(`
                    self.addEventListener('install',e=>e.waitUntil(caches.open('v1').then(c=>c.addAll(['./'])))));
                    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
                `)).catch(()=>{});
            }
        });

        function start(showSetup = true) {
            const name = $('name').value.trim() || 'Моё событие';
            const date = $('date').value;
            if (!date) return alert('Выберите дату!');
            
            target = new Date(date).getTime();
            localStorage.setItem('evt', JSON.stringify({name, date}));
            
            $('evtName').textContent = name;
            $('evtDate').textContent = new Date(date).toLocaleDateString('ru-RU', {
                day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'
            });
            
            if (showSetup) {
                $('setup').classList.add('hidden');
                $('countdown').classList.remove('hidden');
            }
            
            clearInterval(timer);
            update();
            timer = setInterval(update, 1000);
            checkNotif();
        }

        function update() {
            const dist = target - Date.now();
            if (dist < 0) {
                clearInterval(timer);                ['d','h','m','s'].forEach(id => $(id).textContent = '00');
                $('evtName').textContent += ' ✓';
                return;
            }
            const d = Math.floor(dist/864e5),
                  h = Math.floor(dist%864e5/36e5),
                  m = Math.floor(dist%36e5/6e4),
                  s = Math.floor(dist%6e4/1000);
            ['d','h','m','s'].forEach((id,i) => {
                const val = [d,h,m,s][i];
                $(id).textContent = val < 10 ? '0'+val : val;
            });
        }

        function reset() {
            localStorage.removeItem('evt');
            location.reload();
        }

        // Notifications
        function requestNotif() {
            if (!('Notification' in window)) return alert('Браузер не поддерживает уведомления');
            Notification.requestPermission().then(p => {
                const btn = $('notifBtn');
                if (p === 'granted') {
                    btn.textContent = '✓ Включено';
                    btn.className = 'btn btn-success';
                    new Notification('Таймер активен!', {
                        body: 'Будем напоминать о событии',
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><circle cx="96" cy="96" r="88" fill="%237DA1ED"/><text x="96" y="110" font-size="80" text-anchor="middle" fill="%23FDE047">⏱</text></svg>'
                    });
                }
            });
        }

        function checkNotif() {
            if (Notification.permission === 'granted' && !sessionStorage.getItem('notified')) {
                const saved = localStorage.getItem('evt');
                if (saved) {
                    const {name, date} = JSON.parse(saved);
                    const days = Math.max(0, Math.floor((new Date(date)-Date.now())/864e5));
                    if (days >= 0) {
                        new Notification(`До "${name}" осталось ${days} дн.`, {
                            body: 'Не забудьте подготовиться!',
                            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><circle cx="96" cy="96" r="88" fill="%237DA1ED"/><text x="96" y="110" font-size="80" text-anchor="middle" fill="%23FDE047">⏱</text></svg>'
                        });
                        sessionStorage.setItem('notified', '1');
                    }
                }
            }        }

        // PWA Install
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            $('installBtn').classList.remove('hidden');
        });

        async function showInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const {outcome} = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    $('installBtn').textContent = '✓ Установлено';
                    $('installBtn').className = 'btn btn-success';
                }
                deferredPrompt = null;
            } else {
                const modal = $('modal');
                modal.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
            }
        }

        function closeInstall() {
            const modal = $('modal');
            modal.classList.remove('active');
            setTimeout(() => modal.classList.add('hidden'), 250);
        }

        // Handle display-mode: standalone (installed)
        if (window.matchMedia('(display-mode: standalone)').matches) {
            $('installBtn').classList.add('hidden');
        }
    </script>
</body>
</html>
